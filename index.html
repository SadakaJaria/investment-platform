اء ليوم واحد فقط تُسمّى:",options:["Time Deposit","Overnight Repo","Prime Rate","Benchmark"],correct:1,source:"عندما تكون الاتفاقية ليوم واحد فقط تُدعى حينئذٍ Overnight Repo."},{q:"الفرق بين سعري الإقراض والاقتراض في سوق النقد يُسمّى:",options:["الخصم","الهامش (Spread)","المردود","علاوة الإصدار"],correct:1,source:"الفرق بين سعري التعامل يمثل الهامش (Spread) أي الربح للجهة المعلنة للسعر."},{q:"في تسعير سوق النقد (مثلاً 6 – 6.25%)، فإن 6% تمثّل:",options:["سعر الاقتراض للجهة المعلنة","سعر الإقراض للجهة المعلنة","الهامش","العمولة"],correct:0,source:"6% تمثل سعر الاقتراض للجهة (المصرف) معلنة السعر، و6.25% تمثل سعر الإقراض لهذه الجهة."},{q:"الجهة التي تُصدر أذونات الخزينة هي:",options:["البنوك التجارية","المصرف المركزي لحساب وزارة المالية","الشركات الكبرى","شركات التأمين"],correct:1,source:"أذونات الخزينة: أوراق مالية حكومية يُصدرها المصرف المركزي لحساب وزارة المالية."},{q:"الأداة التي تُعدّ الأساس/المعيار (Benchmark) لقياس عوائد أدوات سوق النقد:",options:["الأوراق التجارية","القبولات المصرفية","أذونات الخزينة","شهادات الإيداع"],correct:2,source:"أذونات الخزينة تمثل الأساس أو المعيار (Benchmark) الذي تُقاس عليه بقية عوائد أدوات السوق النقدي."},{q:"أذونات الخزينة تُباع:",options:["بخصم دون دفع فائدة للمستثمر","بعلاوة إصدار","بالقيمة الاسمية تماماً","على أساس المردود"],correct:0,source:"تُباع أذونات الخزينة بخصم، أي أنه لا يتم دفع الفائدة للمستثمر بل يُحدد السعر بناءً على مقدار الخصم."},{q:"أيٌّ ممّا يلي من أسباب اعتبار أذونات الخزينة استثماراً ممتازاً؟",options:["ارتفاع عائدها جداً","كونها خالية من المخاطر ولها سوق ثانوي","طول أجلها","ضمانها بأصول عقارية"],correct:1,source:"أسباب اعتبارها ممتازة: كونها خالية من المخاطر، لها سوق مستمر، وقصر استحقاقها يخفض مخاطر انخفاض قيمتها."},{q:"الأوراق التجارية هي في جوهرها:",options:["أمر دفع مسحوب على مصرف","وعد غير مؤكد بالدفع (Unsecured Promissory Notes)","إيصال إيداع","سند حكومي"],correct:1,source:"الأوراق التجارية: وعد غير مؤكد بالدفع (Unsecured Promissory Notes) تصدرها الشركات الكبيرة المعروفة."},{q:"فترة استحقاق الأوراق التجارية تصل إلى:",options:["90 يوماً","270 يوماً","365 يوماً","سنتين"],correct:1,source:"تتراوح فترة استحقاق الأوراق التجارية ما بين أيام قليلة إلى 270 يوماً، وتُباع بخصم."},{q:"السعر الذي تُقرض به المصارف عملاءها المميزين يُسمّى:",options:["Prime Rate","Benchmark","Spread","Yield"],correct:0,source:"سعر الفائدة الأولى (Prime Rate): هو السعر الذي تقرض به المصارف التجارية عملاءها المميزين."},{q:"الضمان الأساسي للأوراق التجارية هو:",options:["أصول عقارية","ضمان حكومي","سمعة المنشأة وجدارتها الائتمانية","وديعة نقدية"],correct:2,source:"تمثل سمعة المنشأة وجدارتها الائتمانية الأساس في ضمان هذه الأوراق من قبل البنوك."},{q:"الأداة التي تُباع على أساس المردود (Yield) وليس الخصم مثل السند:",options:["أذونات الخزينة","الأوراق التجارية","شهادات الإيداع القابلة للتداول","القبولات المصرفية"],correct:2,source:"تختلف شهادات الإيداع في أنها مثل السند تُباع على أساس المردود Yield وليس على أساس الخصم Discount."},{q:"تُحسب الفائدة السنوية على شهادات الإيداع القابلة للتداول على أساس:",options:["360 يوماً","365 يوماً","180 يوماً","90 يوماً"],correct:1,source:"تُحسب الفائدة السنوية على شهادات الإيداع القابلة للتداول على أساس 365 يوماً بدلاً من 360 يوماً."},{q:"طريقة إصدار شهادات الإيداع بناءً على طلب العميل تُسمّى:",options:["Tranche Issue","Tap Issue","Overnight","Call Option"],correct:1,source:"الإصدار بناءً على طلب العميل (Tap Issue): تُصدر الشهادة بالمبلغ والمدة وسعر الفائدة المتفق عليها مع العميل."},{q:"طريقة الإصدار المعلن لشهادات الإيداع تُسمّى:",options:["Tap Issue","Tranche Issue","Repo","Prime Issue"],correct:1,source:"طريقة الإصدار المعلن (Tranche Issue): يعلن المصرف عن إصدار شهادات الإيداع ويدعو الجمهور للاكتتاب."},{q:"القبول المصرفي هو:",options:["أمر بالدفع مسحوب على مصرف من قبل عميل","وعد غير مؤكد بالدفع","إيصال إيداع","سند ملكية"],correct:0,source:"القبولات المصرفية: أمر بالدفع مسحوب على مصرف من قبل عميل معين، حيث يقبل البنك دفع مبلغ معين في تاريخ محدد."},{q:"ظهرت القبولات المصرفية أساساً لتنشيط:",options:["سوق العقارات","حركة التجارة الدولية","الإقراض الاستهلاكي","سوق الأسهم"] ر، ويقيس هذا المؤشر التشتت (Dispersion) حول القيمة المتوقعة."},{q:"العلاقة بين قيمة الانحراف المعياري ودرجة المخاطر هي:",options:["عكسية","طردية","لا علاقة","ثابتة"],correct:1,source:"كلما ازدادت قيمة الانحراف المعياري كلما كانت المخاطر مرتفعة، فهناك علاقة طردية بين قيمة الانحراف المعياري ودرجة المخاطر."},{q:"في حساب الانحراف المعياري، نقسم على (n−1) في حالة:",options:["المجتمع الأصلي","عيّنة من الأسهم","دائماً","لا نقسم أبداً"],correct:1,source:"القسمة على (n−1) في حالة عيّنة من الأسهم، أما في حالة المجتمع الأصلي فإن (1/(n−1)) تتحول إلى (1/n)."},{q:"وفقاً لمقياس معامل الاختلاف، الاستثمار الأفضل هو صاحب:",options:["أعلى معامل اختلاف","أقل معامل اختلاف","أعلى انحراف معياري","أعلى عائد فقط"],correct:1,source:"يرتبط قبول المقترح الاستثماري بأقل قيمة للانحراف المعياري (أقل درجة للمخاطرة) طالما أن العوائد متساوية. ومعامل الاختلاف مقياس نسبي للتشتت يفيد في مقارنة مخاطر الاستثمار."},{q:"وفق قاعدة التوزيع الطبيعي، تقع ضمن ±1σ نسبة:",options:["95.46%","68.26%","99.74%","50%"],correct:1,source:"بالنسبة لتوزيع احتمالي طبيعي، يوجد احتمال 68.26% أن يقع العائد المحقق ما بين −1 و +1 انحراف معياري، ويزداد إلى 95.46% عند ±2، ويصل إلى 99.74% عند ±3."},{q:"تُقسم مخاطر الاستثمار بشكل عام إلى:",options:["قصيرة وطويلة","منتظمة وغير منتظمة","محلية وأجنبية","كبيرة وصغيرة"],correct:1,source:"تقسم مخاطر الاستثمار بشكل عام إلى نوعين: مخاطر منتظمة (Systematic) ومخاطر غير منتظمة (Nonsystematic)."},{q:"المخاطر التي تطال السوق ككل ولا يمكن الحد منها بالتنويع هي:",options:["غير المنتظمة","المنتظمة (السوقية)","مخاطر الإدارة","مخاطر الصناعة"],correct:1,source:"المخاطر المنتظمة (السوقية): عوامل تؤثر في الأوراق المالية بوجه عام وتؤثر على نظام السوق ككل، ولا يمكن الحد منها عن طريق التنويع في المحفظة."},{q:"المخاطر التي تتعلق بشركة أو قطاع معين ويمكن الحد منها بالتنويع:",options:["المنتظمة","غير المنتظمة (الخاصة)","السوقية","مخاطر التضخم"],correct:1,source:"المخاطر غير المنتظمة (غير السوقية): ناتجة عن عوامل تتعلق بشركة أو قطاع معين، فهي لا تؤثر على السوق ككل، ويمكن الحد منها عن طريق التنويع."},{q:"أيٌّ ً","الأعلى مخاطرة","أيّهما"],correct:1,source:"في حال تساوي المخاطرة وعدم تساوي العوائد المتوقعة يتم قبول البديل الاستثماري ذي العائد الأعلى."},{q:"المحفظة التي تركّز على أوراق تعطي دخلاً سنوياً عالياً هي:",options:["محفظة النمو","محفظة الدخل","المحفظة المتخصصة","المحفظة الهجومية"],correct:1,source:"تركّز محفظة الدخل على الأوراق المالية التي تعطي دخلاً سنوياً عالياً، سواء كان مصدره توزيعات الأرباح النقدية لحملة الأسهم أو الفوائد التي تدفع لحملة السندات."},{q:"المحفظة التي تركّز على أدوات تحقق إيرادات رأسمالية تنمّي أموال المحفظة:",options:["محفظة الدخل","محفظة النمو","المحفظة المتوازنة","المحفظة المتخصصة"],correct:1,source:"تركّز محفظة النمو على أدوات الاستثمار التي تحقق إيرادات رأسمالية تؤدي إلى نمو أموال المحفظة وزيادتها."},{q:"المحفظة التي تتكوّن من أسهم عادية وممتازة وسندات معاً هي:",options:["محفظة الدخل","المحفظة المتوازنة","محفظة النمو","المحفظة المتخصصة"],correct:1,source:"المحفظة المتوازنة تتكوّن عادةً من أسهم عادية وممتازة وسندات، حيث يأمل المستثمر بأرباح رأسمالية وتوزيعات نقدية وفوائد مع المحافظة على رأس ماله."},{q:"المحفظة التي تتخصص بأسهم شركات صناعية مختارة (كالطيران والطاقة) هي:",options:["محفظة الدخل","المحفظة المتخصصة في الصناعات","المحفظة المتوازنة","محفظة النمو"],correct:1,source:"المحفظة المتخصصة في الصناعات: تتخصص في الاستثمار بأسهم شركات صناعية مختارة مثل شركات الطيران أو الموارد الطبيعية أو الشركات المتعلقة بالطاقة والنفط."},{q:"الميزة الرئيسية لتكوين المحافظ الاستثمارية هي:",options:["المضاربة","التنويع (Diversification)","الاقتراض","المتاجرة اليومية"],correct:1,source:"إن الميزة الرئيسية لتكوين المحافظ الاستثمارية هي التنويع (Diversification)، أي تمكين المستثمر من اختيار تشكيلة الأصول بهدف تخفيض المخاطرة."},{q:"مقولة «لا تضع كل بيضك في سلة واحدة» تعبّر عن:",options:["تنويع ماركويتز","التنويع الساذج (Naive)","تنويع الاستحقاق","التنويع الدولي"],correct:1,source:"يقوم أسلوب التنويع الساذج على الحكمة التي تقول: لا تضع كل ما تملكه من بيض في سلة واحدة (Not putting all the eggs in one basket)."},{q:"وفق دراسة Evans & Archer، العدد الذي يتخلص عنده من الجزء الأكبر من المخاطر غير المنتظمة هو:",options:["5 أوراق","حوالي 15 ورقة","50 ورقة","100 ورقة"],correct:1,source:"تشير دراسة Evans and Archer 1968 إلى أن احتواء المحفظة على حوالي 15 ورقة مالية كحد أقصى يؤدي إلى التخلص من الجزء الأكبر من المخاطر غير المنتظمة."},{q:"المخاطر التي يتخلص منها التنويع تدريجياً هي:",options:["المنتظمة","غير المنتظمة","كلاهما","لا شيء"],correct:1,source:"المخاطر المنتظمة تُمثّل على شكل خط مستقيم لا يمكن التخلص منها بالتنويع مهما زاد عدد الأوراق، والمخاطر غير المنتظمة تتناقص تدريجياً كلما زاد عدد الأسهم."},{q:"يعتمد تنويع ماركويتز أساساً على:",options:["عدد الأوراق فقط","معامل الارتباط بين العوائد","حجم الاستثمار","نوع القطاع"],correct:1,source:"يقوم أسلوب ماركويتز على الاختبار الدقيق للاستثمارات المكوّنة للمحفظة من خلال الاعتماد على معامل الارتباط (P) بين العوائد الناتجة عن الاستثمار."},{q:"عند معامل ارتباط ρ = +1 (موجب تام)، فإن بناء المحفظة:",options:["يخفّض المخاطرة لأدنى حد","لا يؤدي إلى تخفيض المخاطرة","يلغي المخاطرة","يضاعف العائد"],correct:1,source:"في حالة الارتباط الموجب التام، بناء محفظة من السهمين لا يؤدي إلى تخفيض المخاطرة، فتكون مخاطرة المحفظة متوسطاً مرجّحاً لمخاطرة السهمين معاً."},{q:"القاعدة التي يرتكز عليها مبدأ التحوّط (التأمين ضد المخاطر) هي عند:",options:["ρ = +1","ρ = −1","ρ = 0","ρ = 0.5"],correct:1,source:"في الحالة الثالثة عندما يكون معامل الارتباط −1 فإن ذلك يمكن أن يؤدي إلى التخلص من المخاطرة للمحفظة بشكل نهائي، وهذه هي القاعدة التي يرتكز عليها مبدأ التحوّط (التأمين ضد المخاطر)."},{q:"عندما يكون معامل الارتباط ρ = 0، فإن مخاطرة المحفظة:",options:["في أعلى مستوياتها","معدومة","تقع بين الحد الأدنى والأعلى","مساوية لعائدها"],correct:2,source:"مخاطرة المحفظة تكون في أعلى مستوياتها عند ρ=+1، ومعدومة عند ρ=−1، وتقع بين الحد الأدنى والأعلى عندما يكون معامل الارتباط مساوياً للصفر."},{q:"في تنويع تواريخ الاستحقاق، الاستثمارات قصيرة الأجل تسهم أساساً في:",options:["استقرار العائد","توفير السيولة","الأرباح الرأسمالية","زيادة المخاطر"],correct:1,source:"الاستثمارات قصيرة الأجل تسهم في توفير السيولة، بينما الاستثمارات طويلة الأجل توفّر فرصة تحقيق أرباح رأسمالية في حالة انخفاض سعر الفائدة."},{q:"الأسلوب الذي يوزّع الاستثمارات على أوراق بتواريخ استحقاق متتالية يُسمّى:",options:["الهجومي","تدرّج تواريخ الاستحقاق (Laddered)","Barbell","الدولي"],correct:1,source:"أسلوب تدرّج تواريخ الاستحقاق (Laddered Maturity): يقوم المستثمر بتوزيع استثماراته بالتساوي على أوراق مالية بتواريخ استحقاق متتالية."},{q:"أسلوب التركيز على القصير والطويل واستبعاد متوسط الأجل يُسمّى:",options:["Laddered","Barbell","الهجومي","الساذج"],correct:1,source:"أسلوب Barbell: التركيز على الاستثمارات قصيرة الأجل وطويلة الأجل واستبعاد الأوراق المالية متوسطة الأجل."},{q:"شرط أن يؤدي التنويع الدولي إلى تقليل المخاطر هو أن يكون معامل الارتباط بين العوائد المحلية والأجنبية:",options:["موجباً تاماً (+1)","صفراً أو سالباً أو موجباً غير تام","مساوياً للعائد","أكبر من 1"],correct:1,source:"إن التنويع الدولي يؤدي إلى التقليل من المخاطر إذا كان معامل الارتباط بين العائد على الأوراق المحلية والأجنبية صفراً أو سالباً أو موجباً غير تام."},{q:"قاعدة المحفظة في الاستراتيجية الهجومية هي:",options:["أذون الخزينة 60-80%","الأسهم العادية 80-90%","السندات 100%","الذهب"],correct:1,source:"الاستراتيجية الهجومية (Aggressive) يتبناها مديرو المحافظ الذين يفضّلون العائد على الأمان، والنموذج الشائع لها معروف بمحفظة رأس المال، وتكون قاعدتها الأساسية الأسهم العادية بنسب 80-90%."},{q:"قاعدة المحفظة في الاستراتيجية الدفاعية تتكوّن أساساً من:",options:["أسهم عادية 90%","أذون خزينة وأسهم ممتازة 60-80%","سندات أجنبية فقط","عملات"],correct:1,source:"الاستراتيجية الدفاعية (Defensive) يتبناها المحافظون جداً تجاه المخاطرة، ونموذجها الشائع محفظة الدخل، وتتكوّن قاعدتها الأساسية من أذون الخزينة والأسهم الممتازة بنسب 60-80%."},{q:"الاستراتيجية التي تعتبر وسطاً بين الهجومية والدفاعية هي:",options:["المتوازنة (Aggressive-Defensive)","الساذجة","الدولية","المتخصصة"],correct:0,source:"الاستراتيجية المتوازنة (Aggressive-Defensive) تعتبر وسطاً بين النمطين السابقين، ويتبناها مديرو المحافظ الذين يراعون تحقيق استقرار نسبي، وتتكوّن قاعدتها من تشكيلة متوازنة."},{q:"محفظة: 80% ف σ = √[(0.8²×36)+(0.2²×225)+2(0.8)(0.2)(1)(6)(15)] = 7.8%`},{id:"prho",name:"الحالات الخاصة لمعامل الارتباط",single:"ρ=+1: σ = w₁σ₁ + w₂σ₂   |   ρ=−1: σ = |w₁σ₁ − w₂σ₂|   |   ρ=0: σ = √(w₁²σ₁² + w₂²σ₂²)",parts:[["ρ=+1:  σ = w₁σ₁ + w₂σ₂"],["ρ=−1:  σ = |w₁σ₁ − w₂σ₂|"],["ρ=0:  σ = √(w₁²σ₁² + w₂²σ₂²)"]],vars:["w₁,w₂ = الأوزان","σ₁,σ₂ = الانحرافات"],tip:"ρ=+1 اجمع (أعلى مخاطرة) · ρ=−1 اطرح بالمطلق (أدنى/تحوّط) · ρ=0 الجذر للمربّعين.",legend:"الحالات الثلاث تبسّط الصيغة العامة",fast:"«الأوزان» = w₁,w₂ · «الانحرافات» = σ₁,σ₂. ρ=+1: اجمع مباشرة w₁σ₁+w₂σ₂ (أعلى مخاطرة). ρ=−1: اطرح وخذ المطلق |w₁σ₁−w₂σ₂| (أدنى/تحوّط). ρ=0: √(w₁²σ₁²+w₂²σ₂²).",example:"80/20، σ 6%/15%: ρ=+1 → 7.8% · ρ=−1 → 1.8%"},{id:"wopt",name:"الوزن الأمثل للمخصصات",single:"w₁ = σ₂(σ₂ − σ₁·ρ₁,₂) ÷ (σ₁² + σ₂² − 2·σ₁·σ₂·ρ₁,₂)",parts:[["w₁ = ",{n:"σ₂(σ₂ − σ₁·ρ)",d:"σ₁² + σ₂² − 2·σ₁·σ₂·ρ"}]],vars:["σ₁ = انحراف الأولى · σ₂ = الثانية","ρ = الارتباط"],tip:"حفظ سريع: عند ρ=−1 يصبح w₁ = σ₂/(σ₁+σ₂). الوزن الأكبر للأقل مخاطرة.",legend:"تُعطي الوزن الذي يُصغّر تباين المحفظة · والوزن الثاني = 1 − w₁",fast:"«انحراف الأولى» = σ₁ · «الثانية» = σ₂ · «الارتباط» = ρ. w₁ = σ₂(σ₂−σ₁ρ) ÷ (σ₁²+σ₂²−2σ₁σ₂ρ). حفظ سريع: عند ρ=−1 يصبح w₁ = σ₂/(σ₁+σ₂). الوزن الأكبر دائماً للأقل مخاطرة.",example:`σ₁=0.04، σ₂=0.06، ρ=0.5:
الوزن الأكبر 85.8% للأقل مخاطرة (0.04)، و14.2% للأعلى (0.06)`}]},{id:"ch5",num:"الخامس",title:"بناء المحفظة الاستثمارية المثلى (Optimum Portfolio)",kind:"نظري فقط (وفق المقرر)",quiz:[{q:"مفهوم المحفظة المثلى هو مفهوم:",options:["مطلق وثابت للجميع","نسبي يختلف من مستثمر لآخر","يخص المضاربين فقط","لا علاقة له بالأهداف"],correct:1,source:"إن مفهوم المحفظة المثلى هو مفهوم نسبي، يختلف من وجهة نظر مستثمر إلى آخر وذلك حسب أولوياته وترتيب احتياجاته وأهدافه."},{q:"المحفظة المثلى للمستثمر الرشيد هي التي:",options:["تحقق أعلى مخاطرة","تحقق أعلى عائد لمستوى خطر معين أو تخفض الخطر لأدنى حد لعائد معين","تلغي العائد","تعتمد على الاقتراض"],correct:1,source:"المحفظة المثلى هي تلك المحفظة التي تحقق أعلى عائد ممكن لمستوى خطر معين، أو تلك التي تخفض الخطر إلى الحد الأدنى لمستوى معين من العائد المتوقع."},{q:"المتغيران اللذان يحدد بهما نمط المستثمر بشكل عام هما:",options:["السيولة والوقت","العائد على الاستثمار ومستوى المخاطرة المقبولة","العمر والدخل","القطاع والحجم"],correct:1,source:"يتحدد نمط المستثمر بشكل عام في ضوء متغيرين أساسيين هما: العائد على الاستثمار (ROI)، ومستوى المخاطرة (Risk) المقبولة."},{q:"المستثمر الرشيد تكون منفعته الحدية للعائد:",options:["متزايدة","متناقصة","ثابتة","معدومة"],correct:1,source:"المنفعة الحدية للعائد على الاستثمار بالنسبة للمستثمر الرشيد تكون متناقصة (مثلما تكون المنفعة الحدية للسلع الاقتصادية بالنسبة للمستهلكين متناقصة)."},{q:"المستثمر الذي تكون منفعته الحدية للعائد متزايدة هو:",options:["الرشيد","المضارب","المتحفظ","المؤسسي"],correct:1,source:"نجد بين المستثمرين المضارب الذي تتزايد لديه المنفعة الحدية للعائد على الاستثمار بشكل متزايد."},{q:"المنحنى الذي يمثل مجموعة النقاط الممثلة للمحافظ المثلى يُسمّى:",options:["منحنى السواء","الحد الكفء (Efficient Frontier)","خط السوق","منحنى الطلب"],correct:1,source:"يُعرف منحنى المحافظ المثلى بالحد الفعّال (Efficient Frontier)، ويمثل هذا المنحنى النقاط الممثلة لمجموعة المحافظ المثلى، ويُرسم من العلاقة بين عنصري العائد والمخاطرة."},{q:"الحد الكفء يُرسم بافتراض أن أدوات الاستثمار المتاحة:",options:["خالية من المخاطر","جميعها من النوع الخطر","سندات فقط","أسهم فقط"],correct:1,source:"يُرسم الحد الكفّال مع مراعاة افتراض أن جميع أدوات الاستثمار المتاحة هي فقط من النوع الخطر، حيث لا يوجد بينها أدوات استثمارية خالية من المخاطر."},{q:"المحافظ الواقعة في القطاع الأعلى على يسار المنحنى الكفء تُسمّى:",options:["المحافظ الممكنة (Feasible)","المحافظ غير الممكنة (Infeasible)","المحافظ المثلى","المحافظ الخطرة"],correct:1,source:"القطاع الأعلى الموجود على يسار المنحنى يمثل مجموعة المحافظ غير المتاحة أو غير الممكنة بالنسبة للمستثمر (Infeasible Portfolios)، والقطاع الأدنى على يمينه يمثل المحافظ المتاحة (Feasible)."},{q:"المنحنيات التي تعكس ميول المستثمر في مقايضة العائد بالمخاطرة تُسمّى:",options:["الحد الكفء","منحنيات السواء (Indifference Curves)","خطوط السوق","منحنيات الطلب"],correct:1,source:"لا بد من الاستعانة بمفهوم اقتصادي آخر هو مفهوم منحنيات السواء (Indifference Curves) التي تعكس شكل خريطة سواء المستثمر التي تعكس ميوله أو سلوكه في مقايضة العائد بالمخاطرة."},{q:"كلما ارتفع منحنى السواء (للأعلى) دلّ ذلك على:",options:["مخاطرة أقل","مستوى إشباع أعلى للمستثمر","عائد أقل","سيولة أعلى"],correct:1,source:"منحنيات السواء تتجه من أسفل إلى أعلى ومن اليسار إلى اليمين، وكلما ارتفع مستوى منحنى السواء دلّ ذلك على مستوى إشباع أعلى للمستثمر."},{q:"على خريطة السواء، المستثمر A يقبل 14% بمخاطرة 6% وB يقبل 8% بمخاطرة 10%. أيّهما أكثر تحفظاً؟",options:["المستثمر B","المستثمر A","متساويان","لا يمكن التحديد"],correct:1,source:"المستثمر A أكثر تحفظاً تجاه المخاطرة من المستثمر B، حيث يقبل B الحصول على عائد 8% مقابل درجة مخاطرة 10%، في حين أن المستثمر A العائد المقبول له 14% بدرجة مخاطرة 6%."},{q:"تتحدد المحفظة المثلى بيانياً عند:",options:["أعلى نقطة على منحنى السواء","نقطة التماس بين منحنى سواء المستثمر والحد الكفء","نقطة العائد الخالي من المخاطرة","منتصف المنحنى"],correct:1,source:"تتحدد المحفظة المثلى للمستثمر عند نقطة التماس (Point of Tangency) لأحد منحنيات سواء المستثمر مع الحد الفعّال أو منحنى المحافظ المثلى، أي في النقطة M."},{q:"في حالة السماح بالبيع على المكشوف، تقع المحفظة المثلى على:",options:["منحنى السواء الأدنى","الخط المستقيم R_f B الملامس للمنحنى والمار من نقطة العائد الخالي من المخاطرة","المحور الأفقي","أي نقطة عشوائية"],correct:1,source:"المحفظة الواقعة على الخط المستقيم R_f B الملامس للمنحنى الكفء والمار من نقطة العائد الخالي من المخاطرة هي المحفظة المفضّلة بالنسبة لباقي المحافظ الخطرة."},{q:"دالة الهدف التي تُعظّم لبناء المحفظة المثلى هي:",options:["F = R̄ₚ × σₚ","F = (R̄ₚ − R_f) ÷ σₚ","F = σₚ ÷ R̄ₚ","F = R̄ₚ + R_f"],correct:1,source:"المحفظة المثلى هي تلك المحفظة التي يمكنها أن تحل مشكلة تعظيم دالة الهدف: F = (R̄ₚ − R_f) ÷ σₚ، وهي تمثل ميل الخط الملامس للمنحنى الكفء (النسبة الأعلى من العائد)."},{q:"شروط كوين-تاكر (Kuhn-Tucker) تُستخدم في حالة:",options:["السماح بالبيع على المكشوف","عدم السماح بالبيع على المكشوف","عدم وجود مخاطرة","وجود أصل خالٍ من المخاطر فقط"],correct:1,source:"في ظل فرضية إمكانية الإقراض والاقتراض وفي حال عدم إمكانية البيع على المكشوف، تكون المشكلة برمجة تربيعية، ويمكن استخدام شروط كوين-تاكر لإيجاد الحل الأمثل."},{q:"عدد شروط كوين-تاكر:",options:["شرطان","ثلاثة","أربعة","خمسة"],correct:2,source:"شروط كوين-تاكر هي عبارة عن أربعة شروط: ∂F/∂wᵢ + uᵢ = 0، وwᵢuᵢ = 0، وwᵢ ≥ 0، وuᵢ ≥ 0."},{q:"سبب كون مشكلة بناء المحفظة برمجة تربيعية (Quadratic) هو أن مخاطرة المحفظة تحتوي على:",options:["العائد فقط","الحد التربيعي w² وحاصل wᵢwⱼ","سعر الفائدة","التوزيعات"],correct:1,source:"مخاطرة المحفظة تحتوي على الحد التربيعي w² وتحتوي أيضاً على wᵢwⱼ، وهذا الأمر يجعل من دالة الهدف دالة تربيعية (Quadratic Function)."},{q:"في الحالة الثالثة (عدم إمكانية الإقراض والاقتراض)، تُحل المشكلة عن طريق:",options:["تعظيم العائد فقط","تصغير مخاطرة المحفظة بقيود","إلغاء التنويع","شراء أصل خالٍ من المخاطر"],correct:1,source:"في حالة عدم إمكانية الإقراض والاقتراض بسعر خالٍ من المخاطرة، يتحدد الحد الفعّال عن طريق تخفيض مخاطر المحفظة إلى أقل ما يمكن (MinF) بناءً على مجموعة من القيود."},{q:"القيد الذي يُضاف لضمان حد أدنى من العائد المطلوب هو:",options:["Σwᵢ = 0","Σwᵢdᵢ ≥ D","wᵢ < 0","σₚ = 0"],correct:1,source:"يمكن إدراج قيود أخرى كأن ندرج مثلاً الحد الأدنى من العوائد المطلوبة من قبل المستثمر، فيُضاف القيد: Σwᵢdᵢ ≥ D، حيث dᵢ معدل العائد على الورقة وD الحد الأدنى المطلوب."},{q:"الوزن النسبي wₖ بعد حل جملة المعادلات يُحسب بالعلاقة:",options:["wₖ = yₖ × Σyᵢ","wₖ = yₖ ÷ Σyᵢ","wₖ = Σyᵢ ÷ yₖ","wₖ = yₖ − Σyᵢ"],correct:1,source:"لإيجاد النسبة المستثمرة في كل أصل نعتمد على الصيغة: wₖ = yₖ ÷ Σyᵢ."},{q:"شرط عدم السماح بالبيع على المكشوف يعني أن الوزن wᵢ:",options:["يمكن أن يكون سالباً","لا يمكن أن يكون سالباً (wᵢ ≥ 0)","يساوي صفراً دائماً","أكبر من 1"],correct:1,source:"تقتضي حالة عدم السماح بالبيع على المكشوف أنه لا يمكن أن تكون wᵢ سالبة (wᵢ ≥ 0)."}],formulas:[]},{id:"ch7",num:"السابع",title:"نموذج تسعير الأصول الرأسمالية CAPM ونظرية المراجحة APT",kind:"نظري + عملي",quiz:[{q:"الفضل في استحداث نموذج تسعير الأصول الرأسمالية CAPM يعود بشكل أساسي إلى:",options:["هاري ماركويتز","وليم شارب (Sharpe)","ستيفن روس","يوجين فاما وحده"],correct:1,source:"يعود الفضل في استحداث هذا النموذج إلى وليم شارب (Sharpe, 1964)، وكذلك جون لينتنر (Lintner, 1965) وجان موسين (Mossin, 1966) وايغون فاما (Fama, 1968)."},{q:"من فروض نموذج CAPM أن تقييم المستثمر للورقة المالية يمتد لفترة:",options:["غير محددة","واحدة فقط (One-Period)","خمس سنوات","لا نهائية"],correct:1,source:"من فروض النموذج أن تقييم المستثمر للورقة المالية يمتد لفترة واحدة فقط (One-Period)."},{q:"أيٌّ ممّا يلي ليس من فروض نموذج CAPM؟",options:["توقعات المستثمرين متشابهة عن العوائد والمخاطر","لا توجد تكاليف معاملات ولا ضرائب","المستثمر محبٌّ للمخاطرة","يمكن الإقراض والاقتراض بمعدل خالٍ من المخاطر"],correct:2,source:"من فروض النموذج أن المستثمر بطبيعته يكره المخاطر (وليس محباً لها)، وأن توقعاته متشابهة، ولا توجد تكاليف معاملات أو ضرائب، ويمكن الإقراض والاقتراض بمعدل خالٍ من المخاطرة."},{q:"خط سوق رأس المال (CML) يمثل العلاقة بين العائد والمخاطرة لـ:",options:["كل الأوراق كفوءة أو غير كفوءة","المحافظ الكفوءة فقط في حالة التوازن","الأصول الخالية من المخاطر فقط","الأسهم دون السندات"],correct:1,source:"خط سوق رأس المال (CML) يمثل العلاقة بين العائد المتوقع والمخاطرة لأية محفظة كفوءة عندما يكون سوق رأس المال في حالة ⚠️ الكتاب كتب العائد المطلوب لـ B = 15.6% وهو خطأ حسابي (الصحيح 16.5%)، لكن القرار (رفض B) لا يتغير.`,steps:[{t:"احسب العائد المطلوب لكل سهم وفق CAPM وقارنه بالمقدّر",w:"اللي مقدَّره أعلى من المطلوب = فوق SML = يُقبل:"},{t:"السهم A: قبول",w:"المقدّر 20% > المطلوب 15% → فائض +5% ✅",c:"0.05 + 2(0.05) = 15%"},{t:"السهم B: رفض",w:"المقدّر 14% < المطلوب 16.5% → عجز ❌",c:"0.05 + 2.30(0.05) = 16.5%"},{t:"السهم C: رفض",w:"المقدّر 3% < المطلوب 7.35% → عجز ❌",c:"0.05 + 0.47(0.05) = 7.35%"},{t:"السهم D: قبول",w:"المقدّر 8% > المطلوب 7.75% → فائض +0.25% ✅",c:"0.05 + 0.55(0.05) = 7.75%"},{t:"القرار ✓",w:"تُشترى A و D (فوق خط SML)."},{n:"⚠️ الكتاب كتب العائد المطلوب لـ B = 15.6% وهو خطأ حسابي (الصحيح 16.5%)، لكن القرار (رفض B) لا يتغير."}]},{q:"يُستخدم نموذج CAPM في تقدير سعر الخصم (تكلفة الأموال الخاصة) عبر الخطوات:",options:["تقدير الأرباح فقط","تقدير مؤشرات السوق ← تقدير بيتا للمستثمر/المنشأة ← الوصول لتكلفة الأموال الخاصة","شراء السندات الحكومية","إلغاء المخاطرة"],correct:1,source:"يُستخدم CAPM في تقدير تكلفة الأموال الخاصة (تُستخدم كسعر خصم) عبر: تقدير مؤشرات السوق، ثم تقدير معامل بيتا للمستثمر أو المنشأة، ثم استخدام هذه التقديرات للوصول إلى تكلفة الأموال الخاصة."},{q:"الفضل في وضع نظرية التسعير بالمراجحة (APT) يعود إلى:",options:["وليم شارب","ستيفن روس (S.Ross) عام 1976","هاري ماركويتز","يوجين فاما"],correct:1,source:"وضع ستيفن روس (S.Ross) أسس نظرية التسعير بالمراجحة (APT) في دراسة نُشرت عام 1976، وهي تُعتبر نظرية بديلة لنظرية تسعير الأصول الرأسمالية."},{q:"عدد الفرضيات الرئيسية التي تقوم عليها نظرية التسعير بالمراجحة (APT):",options:["فرضيتان","ثلاث فرضيات رئيسية","خمس","سبع"],correct:1,source:"تستند نظرية المراجحة إلى ثلاث فرضيات رئيسية: المنافسة التامة في أسواق رأس المال، وتفضيل المستثمر زيادة ثروته في ظل ظروف التأكد، وإمكانية التعبير عن العائد كدالة خطية في مجموعة من العوامل والمؤشرات."},{q:"تستخدم نظرية المراجحة (APT) ما يُسمّى بـ:",options:["نموذج المؤشر الواحد","نموذج العوامل (Factor Model)","نموذج جوردون","نموذج والتر"],correct:1,source:"تستخدم نظرية المراجحة نموذج العوامل (Factor Model)، ويُقصد به العوامل الاقتصادية الرئيسية التي تؤثر على أسعار الأوراق المالية (مثل التضخم وسعر الفائدة والناتج المحلي الإجمالي…)."},{q:"وفق نظرية المراجحة APT، يتأثر العائد على الأوراق المالية بنوعين من العوامل هما:",options:["الربح والخسارة","عوامل اقتصادية عامة (عوامل السوق) + عوامل خاصة بالمنشأة","بيتا وألفا فقط","السيولة والأمان"],correct:1,source:"حسب نظرية المراجحة يتأثر العائد بنوعين: عوامل اقتصادية عامة (عوامل السوق التي تمثل المخاطر المنتظمة مثل التضخم وسعر الفائدة)، وعوامل خاصة بالمنشأة المصدرة للأوراق المالية."},{q:"الفرق الجوهري بين نظرية المراجحة APT ونموذج CAPM:",options:["لا فرق بينهما","CAPM يعتمد متغيراً وحيداً (بيتا محفظة السوق)، بينما APT يعتمد على مجموعة عوامل متعددة","APT يهمل المخاطرة","CAPM يستخدم عدة عوامل وAPT عاملاً واحداً"],correct:1,source:"تختلف APT عن CAPM في أن CAPM يعتبر المتغير الوحيد الهام هو حساسية عائد الورقة للتغيرات في محفظة السوق (بيتا)، بينما APT تعتمد على مجموعة من العوامل المتعددة."},{q:"المشكلة الأساسية في نظرية المراجحة (APT) تتمثل في:",options:["صعوبة حساب العائد","عدم تحديد العوامل الاقتصادية التي تؤثر على الأوراق المالية","إهمال سعر الفائدة","الاعتماد على بيتا فقط"],correct:1,source:"المشكلة الأساسية في نظرية المراجحة أنها تتحدث عن عوامل اقتصادية عامة وعوامل خاصة بالمنشأة دون تحديد هذه العوامل بدقة، على عكس CAPM الذي يحدد محفظة السوق كعامل رئيسي."}],formulas:[{id:"cml",name:"خط سوق رأس المال (CML)",single:"E(R)ₚ = R_f + λ·σ(R)ₚ",parts:[["E(R)ₚ = R_f + λ·σₚ"]],vars:["R_f = الخالي من المخاطرة","λ = سعر الخطر","σₚ = مخاطرة المحفظة (الكلية)"],tip:"R_f + (سعر الخطر × المخاطرة الكلية). للمحافظ الكفوءة فقط.",legend:"λ: سعر الخطر التوازني · σ(R)ₚ: المخاطرة الكلية للمحفظة · للمحافظ الكفوءة فقط",fast:"«الخالي من المخاطرة» = R_f · «سعر الخطر» = λ · «مخاطرة المحفظة» = σ. العائد = R_f + λ×σ. للمحافظ الكفوءة فقط (يستخدم المخاطرة الكلية σ).",example:"R_f=6%، λ=0.40، σ=30% → E(R) = 6% + 0.40×30% = 18%"},{id:"lambda",name:"سعر الخطر التوازني λ",single:"λ = (Rₘ − R_f) ÷ σₘ",parts:[["λ = ",{n:"Rₘ − R_f",d:"σₘ"}]],vars:["Rₘ = عائد السوق","R_f = الخالي من المخاطرة","σₘ = مخاطرة السوق"],tip:"علاوة الخطر ÷ مخاطرة السوق = ميل خط CML.",exParts:[["λ = ",{n:"18 − 6",d:"30"}," = 0.40"]],legend:"علاوة خطر السوق ÷ مخاطرة السوق · هو ميل خط CML",fast:"«عائد السوق» = Rₘ · «الخالي من المخاطرة» = R_f · «مخاطرة السوق» = σₘ. λ = (Rₘ−R_f) ÷ σₘ (علاوة الخطر لكل وحدة مخاطرة = ميل خط CML).",example:"(18%−6%)/30% = 0.40"},{id:"beta",name:"معامل بيتا β",single:"βᵢ = cov(i,m) ÷ σ²ₘ = (ρᵢₘ·σᵢ·σₘ) ÷ σ²ₘ",parts:[["βᵢ = ",{n:"cov(i,m)",d:"σ²ₘ"}," = ",{n:"ρ·σᵢ",d:"σₘ"}]],vars:["ρ = الارتباط مع السوق","σᵢ = انحراف السهم · σₘ = انحراف السوق","cov = التغاير مع السوق"],tip:"β = ρ×σᵢ÷σₘ، أو cov÷σ²ₘ. بيتا السوق=1، والخالي من المخاطرة=0.",legend:"يقيس المخاطر المنتظمة (السوقية) · β>1 أخطر من السوق · β=1 مساوٍ · β<1 أقل",fast:"«الارتباط مع السوق» = ρ · «انحراف السهم» = σᵢ · «انحراف السوق» = σₘ. β = ρ×σᵢ ÷ σₘ. لو معطى «التغاير cov» بدل الارتباط: β = cov ÷ σ²ₘ. بيتا السوق = 1، والخالي من المخاطرة = 0.",example:"cov(i,m)=0.020، σ²ₘ=0.01 → β = 2"},{id:"sml",name:"خط سوق الورقة المالية (SML) — CAPM",single:"E(R)ᵢ = R_f + βᵢ·(Rₘ − R_f)",parts:[["E(R)ᵢ = R_f + βᵢ·(Rₘ − R_f)"]],vars:["R_f = الخالي من المخاطرة","Rₘ = عائد السوق","βᵢ = بيتا"],tip:"المطلوب = R_f + β×(علاوة السوق). المتوقع>المطلوب→شراء (فوق SML)، أقل→بيع.",legend:"العائد = خالٍ من المخاطرة + بيتا×علاوة خطر السوق · يعمل لكل الأوراق",fast:"«الخالي من المخاطرة» = R_f · «عائد السوق» = Rₘ · «بيتا» = β. المطلوب = R_f + β×(Rₘ−R_f). العلاقة طردية مع β. المتوقع > المطلوب → فوق الخط (شراء)، أقل → تحته (بيع).",example:"R_f=5%، β=0.9، Rₘ=12% → 5% + 0.9(12%−5%) = 11.3%"},{id:"estr",name:"العائد المقدّر وسعر التوازن",single:"Rᵢ = [D + (P − P₀)] ÷ P₀   |   السعر العادل: نحل P₀ من العائد المطلوب",parts:[["Rᵢ = ",{n:"D + (P − P₀)",d:"P₀"}]],vars:["D = التوزيعات","P = السعر المتوقع · P₀ = السعر الحالي"],tip:"قارن المقدّر بالمطلوب: أكبر→شراء، أقل→بيع، يساوي→توازن. السعر العادل: حلّ للـ P₀.",legend:"D: التوزيعات · P: السعر المتوقع · P₀: السعر الحالي",fast:"«التوزيعات» = D · «السعر المتوقع» = P · «الحالي» = P₀. العائد المقدّر = (D+P−P₀)/P₀. قارنه بالمطلوب (SML): أكبر→شراء، أقل→بيع، يساوي→توازن. السعر العادل: حلّ المعادلة للـ P₀.",example:"المطلوب 16%: 0.16=(5.2+42−P₀)/P₀ → P₀ = 40.68 (السعر العادل)"},{id:"wbeta",name:"بيتا المرجّح للمحفظة *β",single:"*β = Σ(βᵢ·Vᵢ) ÷ ΣVᵢ",parts:[["*β = ",{n:"Σ(βᵢ·Vᵢ)",d:"ΣVᵢ"}]],vars:["βᵢ = بيتا كل أصل","Vᵢ = قيمته السوقية"],tip:"متوسط مرجّح بالقيم. الأصل الخالي من المخاطرة β=0.",legend:"متوسط مرجّح لبيتاوات الأصول بأوزان قيمها السوقية V",fast:"«بيتا كل أصل» = βᵢ · «قيمته السوقية» = Vᵢ. بيتا المحفظة = Σ(βᵢ×Vᵢ) ÷ ΣVᵢ (متوسط مرجّح بالقيم). الأصل الخالي من المخاطرة β=0.",example:"V=1000/1000/1000/500، β=0.75/1.25/1.40/0.2 → *β = 3500/3500 = 1"},{id:"capmdec",name:"قاعدة القرار الاستثماري (CAPM)",single:"اقبل إذا: E(R*) > R_f + *β·(E(Rₘ) − R_f)",parts:[["اقبل إذا:  E(R*) > R_f + *β·(E(Rₘ) − R_f)"]],vars:["E(R*) = العائد المقدّر للمشروع","R_f = الخالي من المخاطرة · *β = بيتا المحفظة"],tip:"احسب المطلوب لكل أصل، قارنه بالمقدّر: مقدّر>مطلوب→قبول (فوق SML)، أقل→رفض.",legend:"قبول المشروع إذا وقع فوق SML (المقدّر > المطلوب)",fast:"احسب المطلوب لكل أصل = R_f + β×(Rₘ−R_f). قارنه بالعائد المقدّر: مقدّر > مطلوب → قبول (فوق SML)، أقل → رفض.",example:"السهم A: مطلوب 15%، مقدّر 20% → فائض +5% → قبول ✅"},{id:"apt",name:"نموذج العوامل (APT)",single:"Rᵢ = E(Rᵢ) + bᵢ₁δ₁ + bᵢ₂δ₂ + … + bᵢₖδₖ + dᵢ",parts:[["Rᵢ = E(Rᵢ) + bᵢ₁δ₁ + bᵢ₂δ₂ + … + bᵢₖδₖ + dᵢ"]],vars:["δₖ = العوامل الاقتصادية العامة","bᵢₖ = حساسية العائد لكل عامل","dᵢ = المخاطر غير المنتظمة"],tip:"APT يعتمد عدة عوامل بدل عامل واحد. مشكلته: عدم تحديد العوامل بدقة.",legend:"δₖ: العوامل الاقتصادية العامة · bᵢₖ: حساسية العائد لكل عامل · dᵢ: المخاطر غير المنتظمة (خاصة بالمنشأة)",fast:"APT يعتمد عدة عوامل (تضخم، فائدة، ناتج محلي…) بدل عامل واحد كما في CAPM. مشكلته: عدم تحديد العوامل بدقة.",example:"واضعها ستيفن روس 1976 · 3 فرضيات رئيسية · نوعا العوامل: عامة + خاصة بالمنشأة"}]},{id:"ch8",num:"الثامن",title:"قياس وتقييم أداء مدراء المحافظ الاستثمارية",kind:"نظري + عملي",quiz:[{q:"ع تيجية توقيت السوق."},{q:"مقياس كورنل (Cornell 1979) يقيس أداء المدير من خلال:",options:["مقارنة العائد بالتوزيعات","الفرق بين العائد الحقيقي والعائد الطبيعي (المعتاد) للأصول التي اختارها","بيتا فقط","الانحراف المعياري"],correct:1,source:"يعدّ كورنل أداء مدير المحفظة جيداً إذا كانت نتائج الأصول التي يختارها أعلى من العوائد المعتاد الحصول عليها؛ ويتم التقييم عبر حساب الفرق بين العائد الحقيقي والعائد الطبيعي (المعتاد) لكل ورقة."},{q:"نموذج فاما وفرنش (Fama & French 1993) لتقييم الأداء يعتمد على العوامل:",options:["السوق فقط","ثلاثة عوامل: السوق + الحجم (SMB) + القيمة الدفترية/السوقية (HML)","بيتا وألفا","سعر الفائدة فقط"],correct:1,ref:"ff8",fast:"فاما‑فرنش = CAPM + عاملين: SMB (الحجم: صغير ناقص كبير) + HML (القيمة الدفترية/السوقية). ثلاثة عوامل بالمجمل.",law:"E(R)ᵢ − R_f = α + β(Rₐᵢ − R_f) + ς·SMB + η·HML + γᵢ",solution:"نموذج العوامل الثلاثة: عامل السوق (Rₐᵢ−R_f)، عامل الحجم SMB (Small Minus Big: شراء الأوراق ذات السعر المنخفض وبيع المرتفعة)، وعامل القيمة HML (High Minus Low book-to-market)."},{q:"عامل SMB في نموذج فاما وفرنش يرمز إلى:",options:["Standard Market Beta","Small Minus Big (عامل الحجم)","Sharpe Market Base","Simple Model Beta"],correct:1,source:"عامل SMB (Small Minus Big Firms) هو عامل الحجم، أو العائد لمحفظة المراجحة التي تهدف إلى شراء الأوراق المالية ذات السعر المنخفض (الشركات الصغيرة) وبيع الأوراق ذات السعر المرتفع (الشركات الكبيرة)."},{q:"عامل HML في نموذج فاما وفرنش يرمز إلى:",options:["High Market Line","High Minus Low (نسبة القيمة الدفترية إلى السوقية Book To Market)","Hedge Market Level","High Median Loss"],correct:1,source:"عامل HML (High Minus Low) هو عائد محفظة المراجحة التي تهدف إلى شراء الأوراق ذات النسبة المنخفضة من Book To Market وبيع الأوراق ذات النسبة المرتفعة منها (عامل القيمة)."},{q:"نموذج كونور وكوراجكزيك (Connor & Korajczyk 1986) يستند إلى:",options:["نموذج جوردون","نظرية الاربتراج (المراجحة APT)","مؤشر شارب","نموذج والتر"],correct:1,source:"يستند نموذج كونور وكوراجكزيك إلى نظرية الاربتراج، ويصف التابع الخطي للعائد بدلالة مجموعة من عوامل الاقتصاد الكلي؛ وفي حالة التوازن تصبح ألفا معدومة، وألفا السالبة تعني ضعف قدرة المدير على الانتقائية."},{q:"نموذج مازوي وترينور (Mazuy & Treynor 1966) يستند أساساً إلى:",options:["الانتقائية فقط","توقيت السوق (Market Timing) بإضافة حد تربيعي","التنويع الساذج","بيتا الثابت"],correct:1,ref:"timing8",fast:"مازوي‑ترينور = «توقيت السوق» بحد تربيعي (Rₘ−R_f)². δ موجب = قدرة على التوقيت.",law:"E(R)ₚₜ − R_ft = αᵢ + βᵢ(Rₘₜ − R_ft) + δᵢ(Rₘₜ − R_ft)² + εᵢ",solution:"يستند إلى قدرة المدير على توقيت السوق. إذا كانت δᵢ موجبة وذات دلالة، دلّ ذلك على قدرة المدير على التنبؤ بارتفاع أسعار السوق (توقيت سوق جيد). العلاقة بين عائد المحفظة والسوق ليست خطية (حد تربيعي)."},{q:"مقياس هنريكسون وميرتون (Henrikson & Merton 1981) يهدف إلى:",options:["حساب العائد فقط","الفصل بين الأداء الخاص بالانتقائية والأداء الناجم عن توقيت السوق (Market Timing)","إلغاء المخاطرة","قياس السيولة"],correct:1,ref:"timing8",fast:"هنريكسون‑ميرتون = يفصل الانتقائية عن التوقيت بمتغير وهمي D (=1 لمّا Rₘ>R_f، وإلا 0).",law:"E(R)ₚₜ − R_f = αᵢ + βᵢ₁(Rₘ − R_f) + βᵢ₂(Rₘ − R_f)·D + εᵢ",solution:"يفصل بين أداء الانتقائية وأداء توقيت السوق بشكل منفصل. المتغير D يأخذ القيمة 1 عندما Rₘ > R_f، والقيمة 0 في الحالة المغايرة."},{q:"في مقياس هنريكسون وميرتون، المتغير الوهمي D يأخذ القيمة 1 عندما:",options:["Rₘ < R_f","Rₘ > R_f","Rₘ = 0","بيتا = 1"],correct:1,source:"المتغير D يأخذ القيمة 1 عندما يكون عائد السوق أكبر من العائد الخالي من المخاطرة (Rₘ > R_f)، ويأخذ القيمة 0 في الحالة المغايرة لذلك."},{q:"مقياس بلوك وفرنش (Block & French 2002) يوضّح أهمية:",options:["العائد الخالي من المخاطرة","الوزن النسبي للأصل داخل المحفظة","المخاطرة الكلية","توقيت السوق"],correct:1,source:"يوضّح نموذج بلوك وفرنش أهمية الوزن النسبي للأصل داخل المحفظة، ويؤثر هذا الوزن بشكل إيجابي على العائد إذا اختار المدير نسبة كبيرة من الأصل ذي العائد المرتفع ضمن تشكيلة المحفظة في الزمن المناسب."},{q:"مقياس الأداء المستند إلى نظرية المراجحة يُعطي العائد المتوقع من المحفظة بالعلاقة:",options:["E(Rₚ) = R_f + β(Rₘ − R_f)","E(Rₚ) = R_f + λ₁β₁,ₚ + λ₂β₂,ₚ + … + λₙβₙ,ₚ","E(Rₚ) = R_f × λ","E(Rₚ) = σₚ ÷ λ"],correct:1,ref:"apt8",fast:"أداء المراجحة (APT): E(Rₚ) = R_f + Σ(λₖ × βₖ). عدة عوامل بدل عامل واحد، لكل عامل علاوته λ.",law:"E(Rₚ) = R_f + λ₁β₁,ₚ + λ₂β₂,ₚ + … + λₙβₙ,ₚ",solution:"العائد المتوقع = العائد الخالي من المخاطرة + مجموع (علاوات المخاطرة لكل عامل). يُقاس الأداء في ثلاث مراحل: اختيار العوامل، تقدير بيتا الأصول، ثم تقدير أسعار العوامل λ."},{q:"(سؤال الفصل) 5 محافظ بعوائد مرجحة 6/4.4/4.2/5.6/11.1% ومخاطر مرجحة 3.5/0.5/3.1/1.65/7.1%، R_f=4%. ما ترتيب الأداء التنازلي وفق شارب؟",options:["A>B>C>D>E","E>D>B>A>C","C>A>B>D>E","A>D>E>B>C"],correct:1,ref:"sharpe8",fast:"احسب شارب (العائد − R_f) ÷ σ لكل محفظة ورتّب تنازلياً. الأعلى = الأفضل أداءً.",law:"Sharpe = (R − R_f) ÷ σ · رتّب تنازلياً",solution:`A=(6−4)/3.5=0.571 · B=(4.4−4)/0.5=0.80 · C=(4.2−4)/3.1=0.065 · D=(5.6−4)/1.65=0.970 · E=(11.1−4)/7.1=1.00

sharpe8",source:"عند التنويع الكامل يكون الارتباط بين عائد المحفظة وعائد السوق = +1 فتتطابق نتائج النماذج الثلاثة؛ وباختلاف درجات التنويع تختلف النتائج باختلاف النموذج."},{q:"يُلاحظ على نموذجي ترينور وجنسن أنهما:",options:["يعتمدان المخاطرة الكلية","يعتمدان معامل بيتا فيهملان المخاطر غير المنتظمة","لا يصلحان للمحافظ","يتجاهلان العائد"],correct:1,ch:"ch8",ref:"jensen8",source:"كلا النموذجين يعتمد معامل بيتا لقياس المخاطر المنتظمة فقط، وبالتالي يهملان المخاطر غير المنتظمة — بعكس شارب الذي يستخدم σ الكلية."},{q:"من عيوب معامل بيتا كمقياس للمخاطر:",options:["تختلف قيمته باختلاف مؤشر السوق المحسوب على أساسه وطول الفترة الزمنية","ثباته المطلق","أنه يقيس المخاطر الكلية","أنه لا يتأثر بالسوق"],correct:0,ch:"ch8",ref:"jensen8",source:"من عيوب بيتا: تختلف قيمته باختلاف مؤشر السوق المرجعي وباختلاف طول الفترة الزمنية المحسوب عليها — فالقيمة ليست مطلقة."},{q:"لماذا لا يفيد معامل بيتا في حالة صناديق الاستثمار المتخصصة (كصناديق المعادن النفيسة)؟",options:["لأن بيتاها مرتفع جداً","لأن بيتاها قد يقارب الصفر رغم أن انحرافها المعياري مرتفع جداً","لأنها بلا عوائد","لأنها خالية من المخاطرة"],correct:1,ch:"ch8",ref:"jensen8",source:"صناديق المعادن النفيسة قد يصل بيتاها إلى الصفر (لا ترتبط بالسوق) رغم أن انحرافها المعياري مرتفع جداً — فبيتا يوحي زوراً بانعدام مخاطرها."},{q:"من الصعوبات العملية في نماذج التقييم المعتمدة على عائد السوق:",options:["سهولة الحساب المفرطة","صعوبة تحديد معدل عائد السوق المناسب لأن المحفظة قد تضم سندات وودائع ونقداً أجنبياً وليس أسهماً فقط","عدم توفر بيانات الأسهم","ثبات عائد السوق"],correct:1,ch:"ch8",ref:"fama8",source:"عائد السوق يمثل متوسط عوائد الأسهم المدرجة، بينما المحفظة قد تضم منتجات أخرى (سندات، أذونات، ودائع، نقد أجنبي) — مما يؤثر في مصداقية المقارنة."}],formulas:[{id:"simple8",name:"الأسلوب البسيط",parts:[["rₚ = ",{n:"f + (V_f − Vᵢ)",d:"Vᵢ"}]],vars:["f = التوزيعات + الأرباح الرأسمالية المحققة","V_f = قيمة المحفظة نهاية الفترة","Vᵢ = قيمة المحفظة بداية الفترة"],tip:"اجمع التوزيعات مع التغيّر في القيمة (V_f − Vᵢ)، واقسم على القيمة الابتدائية Vᵢ. يهمل ال ممكن نفس المتوسط، بس واحد ثابت وواحد بيرقص. الانحراف بيقيس قدّيش بترقص العوائد حوالين متوسطها. شوف بُعد كل عائد عن المتوسط، ربّعه (تشيل الإشارة السالبة)، خُد المتوسط، وجذّر لترجع للوحدة الأصلية. انتبه: بالعيّنة نقسم على (n−1) مو n.",h:"قدّيش تبعد العوائد عن متوسطها: ربّع الفروقات، خُد متوسطها، ثم جذّر."},{name:"معامل الاختلاف — المخاطرة النسبية",tag:"CV = σ ÷ E(R)",f:"CV = σ ÷ E(R)",s:"سؤال ذكي: سهم مخاطرته 10 وآخر مخاطرته 12 — أيّهما أخطر؟ ما بتقدر تحكم إلا إذا عرفت عائد كل واحد. المعامل بيقيس قدّيش مخاطرة مقابل كل وحدة عائد. الأصغر أفضل: مخاطرة أقل لكل ليرة عائد.",h:"المخاطرة ÷ العائد — والأصغر هو الأفضل."},{name:"قيمة Z — للاحتمالات",tag:"Z-score",f:"Z = [R − E(R)] ÷ σ",s:"بدك احتمال إنو العائد يكون أقل/أكثر من رقم معيّن. Z بتحوّل سؤالك لـ«كم انحراف معياري يبعد هالرقم عن المتوسط»، وبعدها جدول Z بيعطيك المساحة (الاحتمال). للطرف الواحد: اطرح من 1.",h:"(الرقم − المتوسط) ÷ الانحراف = كم انحراف يبعد عن المركز، ثم روح للجدول."}]},{idx:"02",title:"المحفظة — ورقتين وأكثر",sub:"لما تجمع أوراق مع بعض. المفاجأة اللطيفة: مخاطرة المحفظة ممكن تكون أقل من أوراقها منفردة — هاد سحر التنويع.",laws:[{name:"عائد المحفظة",tag:"E(Rₚ) = Σ Wᵢ·Rᵢ",f:"E(Rₚ) = Σ Wᵢ · Rᵢ",s:"محفظتك فيها عدة أوراق، كل وحدة بوزن (نسبة من مالك). عائد المحفظة = المتوسط الموزون: كل ورقة بتساهم بعائدها حسب حجمها فيك. الورقة اللي حاطط فيها أكتر بتأثّر أكتر.",h:"اضرب وزن كل ورقة بعائدها، واجمع."},{name:"التغاير — الانحراف المشترك بين ورقتين",tag:"cov(1,2)",f:"cov(1,2) = Σ Pᵢ·(R₁ᵢ − E₁)·(R₂ᵢ − E₂)",s:"بدك تعرف هل الورقتين بيتحركوا سوا ولا عكس بعض. لكل حالة اقتصادية: اضرب (بُعد الأولى عن متوسطها × بُعد الثانية عن متوسطها × الاحتمال) واجمع. الموجب = بيتحركوا بنفس الاتجاه · السالب = عكس بعض (وهاد أحسن للتنويع!). هاد التغاير هو أساس بيتا ومعامل الارتباط.",h:"لكل حالة: (انحراف الأولى × انحراف الثانية × الاحتمال)، واجمع. سالب = تنويع أفضل."},{name:"مخاطرة المحفظة — حسب الارتباط ρ",tag:"σₚ · correlation",f:"ρ=+1 → σₚ = w₁σ₁ + w₂σ₂",alt:"ρ=−1 → σₚ = |w₁σ₁ − w₂σ₂|   ·   ρ=0 → σₚ = √(w₁²σ₁² + w₂²σ₂²)",s:"هون سحر التنويع. الارتباط ρ بيقول هل الورقتين بيتحركوا سوا: عند +1 يتحركوا سوا تماماً، ما في فايدة تنويع → اجمع. عند −1 يتحركوا عكس بعض فيلغوا بعض → اطرح (وممكن توصل صفر!). عند 0 ما في علاقة → جذر مجموع المربعات.",h:"حسب الارتباط: +1 اجمع · −1 اطرح · 0 جذر مجموع المربعات."},{name:"القانون الأمّ لمخاطرة المحفظة",tag:"σ²ₚ — full variance",f:"σ²ₚ = w₁²σ₁² + 2·w₁·w₂·ρ·σ₁·σ₂ + w₂²σ₂²",s:"هاد الأصل اللي بتطلع منه الحالات الثلاث فوق. ثلاث حدود: مخاطرة الأولى، مخاطرة الثانية، والحد الأوسط اللي بيمثّل العلاقة بينهن (فيه ρ). لما ρ=0 الحد الأوسط بيصير صفر · لما ρ=+1 أو −1 بينضغط للصيغ المختصرة. احفظ هالواحد وكل الباقي بيطلع منه.",h:"مربّع كل ورقة + ضِعف الحد المشترك (اللي فيه الارتباط)، ثم جذّر."},{name:"الوزن الأمثل — أقل مخاطرة",tag:"w · optimal weight",f:"w₁ = σ₂(σ₂ − σ₁·ρ) ÷ (σ₁² + σ₂² − 2σ₁σ₂ρ)",alt:"مختصر عند ρ=−1:  w₁ = σ₂ ÷ (σ₁ + σ₂)",s:"بدك تعرف كم تحط بكل ورقة لتصير مخاطرة المحفظة أقل ما يمكن. القاعدة الذهبية اللي بتنقذك بالامتحان: الوزن الأكبر دايماً بيروح للورقة الأقل مخاطرة (مهما كان ترتيب الرموز). وعند ارتباط −1 في مختصر حلو: وزن الورقة = انحراف الورقة التانية ÷ مجموع الانحرافين.",h:"الوزن الأكبر للورقة الأقل مخاطرة · عند −1: انحراف الأخرى ÷ مجموع الانحرافين."},{name:"المحفظة ذات التباين الأدنى MVP",tag:"min-variance portfolio",f:"w₁ = σ₂(σ₂ − σ₁·ρ) ÷ (σ₁² + σ₂² − 2σ₁σ₂ρ)",s:"هي المحفظة اللي عندها أقل مخاطرة ممكنة من أي مزيج للورقتين — أقصى نقطة يسار على منحنى المحافظ الممكنة. بتطلعها بنفس معادلة الوزن الأمثل تماماً. الفرق فكرة مو حساب: هون هدفك مو أعلى عائد، بل أقل تذبذب ممكن.",h:"نفس معادلة الوزن الأمثل — النتيجة أقل مخاطرة ممكنة (أقصى يسار المنحنى)."},{name:"الأوزان من عائد مستهدف",tag:"solve for w",f:"Rₚ = w·R₁ + (1−w)·R₂   →   حُلّ لـ w",s:"العملية العكسية: بيعطوك عائد محفظة مطلوب وبدهم الأوزان. حط عائد المحفظة = المتوسط الموزون، وبيصير عندك معادلة بمجهول واحد (w)، حُلّها. الوزن الأكبر بيروح للورقة الأقرب عائداً للهدف. لازم يكون الهدف بين عائدي الورقتين.",h:"حط العائد المستهدف = w·R₁ + (1−w)·R₂، وحُلّ المعادلة لإيجاد w."}]},{idx:"03",title:"CAPM وخط السوق",sub:"قلب المادة. الفكرة الجامعة: العائد المطلوب = الأمان + مكافأة على المخاطرة. كل قانون هون تفريعة من هالجملة.",laws:[{name:"بيتا — شجاعة السهم",tag:"β = cov ÷ σ²ₘ",f:"βᵢ = cov(i,m) ÷ σ²ₘ",s:"بيتا مقياس شجاعة سهمك مقابل السوق: لما السوق يتحرك حركة، قدّيش سهمك بيتحرك؟ اقسم «تحرّك سهمك مع السوق» (التغاير) على «تحرّك السوق مع حالو» (تباين السوق). β=1 يتحرك مثل السوق · β>1 أشجع (هجومي) · β<1 أهدى (دفاعي).",h:"كم يتحرك سهمك لكل حركة بالسوق: التغاير ÷ تباين السوق."},{name:"بيتا المحفظة",tag:"*β = Σ(βᵢ·Vᵢ) ÷ ΣVᵢ",f:"*β = Σ(βᵢ · Vᵢ) ÷ Σ Vᵢ",s:"بيتا المحفظة كلها = المتوسط الموزون لبيتاوات أوراقها، كل ورقة بتساهم ببيتاها حسب حجمها. ملاحظة بتنفعك: أذون الخزينة بيتاها صفر، فوجودها بيسحب بيتا المحفظة لتحت.",h:"المتوسط الموزون لبيتاوات الأوراق (بأوزان قيمها السوقية)."},{name:"العائد المطلوب — CAPM / خط SML ⭐",tag:"E(R) = R_f + β(Rₘ − R_f)",f:"E(R)ᵢ = R_f + βᵢ · (Rₘ − R_f)",s:"القانون الأشهر بالمادة، وأبسط مما بيبيّن. تخيّل بدك تحط مصاري. الأمان R_f = أذون الخزينة (عائد صغير مضمون). عشان تتغرى تخاطر بالسوق، لازم ياخد مكافأة = الفرق بين عائد السوق والأمان (Rₘ−R_f). وبيتا شجاعة سهمك بتضاعف هالمكافأة. النتيجة: عائدك = الأمان + (شجاعتك × مكافأة السوق).",h:"الخالي من المخاطرة + بيتا × (عائد السوق − الخالي من المخاطرة)."},{name:"العائد المتوقَّع/المقدَّر من السهم",tag:"R = [D+(P−P₀)]÷P₀",f:"Rᵢ = [D + (P − P₀)] ÷ P₀",s:"انتبه للفرق: هاد العائد اللي بتتوقعه فعلاً من السهم، مو المطلوب نظرياً. بتاخد التوزيعات + الربح الرأسمالي (فرق السعر) وبتقسم على سعر الشراء. الخطوة الجاية: تقارنه بالمطلوب من CAPM لتقرّر.",h:"(التوزيعات + فرق السعر) ÷ سعر الشراء."},{name:"قرار الشراء أو البيع",tag:"المقدّر vs المطلوب",f:"اقبل / اشترِ  إذا  المقدّر > المطلوب (CAPM)",s:"هون بتجمع القطعتين. احسب المطلوب من CAPM، وحطّ جنبه المتوقّع/المقدّر. إذا المتوقّع أعلى من المطلوب = السهم رخيص (فوق خط SML) = اشترِ. أقل = غالي = بِع. مساوي = عادل. تخيّل خط SML «السعر العادل»، وأي سهم فوقه لقية.",h:"فوق الخط رخيص اشترِ · على الخط عادل · تحت الخط غالي بِع."},{name:"خط سوق رأس المال CML + سعر الخطر λ",tag:"E(Rₚ) = R_f + λ·σₚ",f:"λ = (Rₘ − R_f) ÷ σₘ   ثم   E(R)ₚ = R_f + λ · σₚ",s:"شبيه CAPM بس للمحافظ الكفوءة، وبيستخدم المخاطرة الكلية σ بدل بيتا. λ هي «سعر الخطر» — قدّيش عائد إضافي بتاخد لكل وحدة مخاطرة، وهي ميل الخط. احسب λ مرة (علاوة السوق ÷ مخاطرة السوق) واستخدمها.",h:"λ = علاوة السوق ÷ مخاطرة السوق · ثم العائد = الأمان + λ × مخاطرة المحفظة."}]},{idx:"04",title:"قياس أداء المدير",sub:"أسهل عائلة — كلها نفس الفكرة: العائد الإضافي فوق الأمان ÷ نوع من المخاطرة. لو مسكت وحدة مسكت الثلاثة.",note:"الثلاثة الأولى نفس البسط تماماً (العائد − الأمان). الفرق بالمقام فقط: شارب يقسم على المخاطرة الكلية σ · ترينور على بيتا · جنسن يطرح المتوقَّع بدل ما يقسم.",laws:[{name:"مؤشر شارب",tag:"Sharpe",f:"Sharpe = (E(R)ₚ − R_f) ÷ σₚ",s:"قدّيش عائد إضافي فوق الأمان أخذت المحفظة، مقابل كل وحدة مخاطرة كلية (انحراف معياري). الأعلى = مدير أشطر لكل وحدة مخاطرة تحمّلها.",h:"(عائد المحفظة − الأمان) ÷ الانحراف المعياري."},{name:"مؤشر ترينور",tag:"Treynor",f:"Treynor = (E(R)ₚ − R_f) ÷ βₚ",s:"نفس شارب بالضبط، بس يقسم على بيتا بدل الانحراف — يعني بيقيس العائد الإضافي مقابل المخاطرة السوقية فقط (مو الكلية). الأعلى أفضل.",h:"(عائد المحفظة − الأمان) ÷ بيتا المحفظة."},{name:"ألفا جنسن",tag:"Jensen's α",f:"α = (E(R)ₚ − R_f) − βₚ(E(R)ₘ − R_f)",alt:"مختصراً: α = العائد المحقق − العائد المطلوب (CAPM)",s:"ألفا بتقيس قدّيش المدير تفوّق على المتوقَّع منه. احسب العائد اللي المفروض يحققه حسب مخاطرته (من CAPM)، واطرحه من اللي حققه فعلاً. موجب = تفوّق · صفر = عادي · سالب = تقصير.",h:"العائد المحقق − العائد المطلوب حسب CAPM · موجب يعني المدير شاطر."},{name:"عائد المحفظة البسيط (خلال فترة)",tag:"rₚ · single period",f:"rₚ = [ f + (V_f − Vᵢ) ] ÷ Vᵢ",s:"عائد محفظة خلال فترة: كل الفلوس اللي دخلت (توزيعات + أرباح محققة = f) زائد كم كبرت المحفظة (فرق القيمة)، مقسوم على قيمة البداية.",h:"(الدخل النقدي + نمو القيمة) ÷ قيمة البداية."}]},{idx:"05",title:"الرافعة المالية",sub:"قانونين توأم. كلاهما بيقيس «قدّيش شي بيتضخّم لما يتغيّر شي قبله». التشغيل ينظر للمبيعات، والتمويل للفوائد.",laws:[{name:"رافعة التشغيل",tag:"DOL",f:"DOL = %ΔEBIT ÷ %ΔQ = Q(P−V) ÷ [Q(P−V) − F]",s:"قدّيش أرباح التشغيل حسّاسة لتغيّر المبيعات: لو المبيعات زادت 10% كم بتزيد الأرباح؟ التكاليف الثابتة هي اللي بتكبّر الرافعة — لأنها ما بتتغيّر مع المبيعات فبتضخّم الأثر.",h:"نسبة تغيّر الأرباح ÷ نسبة تغيّر المبيعات."},{name:"رافعة التمويل",tag:"DFL",f:"DFL = EBIT ÷ (EBIT − I)",s:"نفس فكرة التشغيل بس للفوائد: قدّيش ربح السهم حسّاس لتغيّر أرباح التشغيل. الفائدة على الديون (I) هي اللي بتكبّر الرافعة.",h:"EBIT ÷ (EBIT − الفائدة)."},{name:"الرافعة المشتركة",tag:"CL = DOL × DFL",f:"CL = DOL × DFL",s:"التشغيل بيكبّر أثر المبيعات على أرباح التشغيل، والتمويل بيكبّر أثر أرباح التشغيل على ربح السهم. لما تضربهن ببعض بتطلع الرافعة الكلية: قدّيش المبيعات بتأثّر على ربح السهم النهائي مروراً بالمرحلتين. ببساطة حاصل ضرب الرافعتين.",h:"رافعة التشغيل × رافعة التمويل."}]},{idx:"06",title:"أدوات سوق النقد",sub:"قصير الأجل. هون الثابت هو المفتاح: كل أداة إلها رقمها. اعرف الأداة ← اعرف الثابت ← عوّض.",note:"مفتاح الثوابت: أذون خزينة / قبول مصرفي → 360 · ورقة تجارية → 36000 · شهادة إيداع → 36500. لو حفظت أي أداة لأي ثابت، نصف الشغل خلص.",laws:[{name:"أذون الخزينة — العائد الحقيقي",tag:"BDY · ثابت 360",f:"BDY = [(الاسمية − سعر الشراء) ÷ الاسمية] × (360 ÷ الأيام)",s:"الأذونات تُباع بخصم (أرخص من قيمتها الاسمية). العائد = الخصم نسبةً للاسمية، مسنوّى على 360 يوم. المفتاح اللي يغلط فيه الكل: القسمة على الاسمية مو سعر الشراء.",h:"الخصم ÷ الاسمية × (360 ÷ الأيام)."},{name:"القبول المصرفي — الفائدة المكافئة",tag:"BA · ثابت 360",f:"الفائدة السنوية = A_b ÷ [ 100 − (A_b × الأيام) ÷ 360 ]",s:"خصم بيتحوّل لفائدة سنوية مكافئة. الحيلة: القسمة على صافي المبلغ (بعد طرح الخصم) هي اللي بترفع العائد عن رقم الخصم الظاهري.",h:"الخصم ÷ صافي المبلغ [100 − (الخصم × الأيام) ÷ 360]."},{name:"الورقة التجارية — سعر الشراء",tag:"CP · ثابت 36000",f:"U = الاسمي × [1 + (d×r)/36000] ÷ [1 + (y×n)/36000]",s:"نسبة بين حدّين متشابهين: البسط بمعدل الإصدار، المقام بمعدل السوق الحالي. لو معدل السوق أعلى (المقام أكبر) بيطلع السعر أقل من الاسمي. كل حد = 1 + (معدل × أيام) ÷ 36000.",h:"الاسمي × (حد الإصدار ÷ حد السوق)، وكل حد: 1 + (معدل × أيام) ÷ 36000."},{name:"شهادة الإيداع — صافي الحصيلة",tag:"CD · ثابت 36500",f:"s = الاسمي × [36500 + (Rc×p)] ÷ [36500 + (Rn×pₑ)]",s:"نفس فكرة الورقة التجارية بس بثابت 36500 (لأنها 365 يوم). البسط بمعدل الشهادة وأيامها الكاملة، المقام بمعدل السوق والأيام المتبقية عند البيع.",h:"الاسمي × (36500+معدل الشهادة×أيامها) ÷ (36500+معدل السوق×المتبقي)."},{name:"العائد السنوي على سهم",tag:"annualized return",f:"العائد السنوي = [D + (P₁ − P₀)] ÷ P₀ × (360 ÷ n)",s:"احسب عائد الفترة أول: (التوزيعات + الربح) ÷ سعر الشراء. بعدها سنوّيه بضربه × (360 ÷ الأيام). كلمة «بعد كذا يوماً» بالسؤال = لازم تسنوّي.",h:"عائد الفترة × (360 ÷ عدد الأيام)."}]},{idx:"07",title:"نماذج متقدمة لقياس الأداء",sub:"أغلبها أسئلة نظرية (تعرف الفكرة أهم من الحساب). القاعدة الجامعة: كلها محاولات لتفسير العائد بعوامل أدق من CAPM، أو لتفكيك أداء المدير لمكوّناته.",note:"بالامتحان غالباً بيجوا كأسئلة «اختيار من متعدد» عن الفكرة أو اسم النموذج — مو حساب طويل. ركّز على: شو بيضيف كل نموذج على CAPM، وشو معنى كل رمز.",laws:[{name:"نظرية المراجحة APT",tag:"APT · multi-factor",f:"E(Rₚ) = R_f + λ₁β₁ + λ₂β₂ + … + λₙβₙ",s:"CAPM بيفترض مصدر خطر واحد: السوق. APT بيقول لأ — في عدة مصادر خطر (تضخم، أسعار فائدة، نمو اقتصادي...)، كل عامل إلو سعر خطر خاص λ وحساسية خاصة β. فالعائد = الأمان + مجموع (سعر كل عامل × حساسيتك له). يعني CAPM هو حالة خاصة من APT بعامل واحد.",h:"الأمان + مجموع (سعر خطر كل عامل × حساسية المحفظة له) — CAPM بعدة عوامل."},{name:"نموذج فاما وفرنش (العوامل الثلاثة)",tag:"Fama-French · 3-factor",f:"E(R)ᵢ − R_f = α + β(Rₘ − R_f) + ς·SMB + η·HML",s:"لاحظوا إنو CAPM ما بيفسّر كل شي: الشركات الصغيرة والرخيصة (قيمة دفترية عالية) بتعطي عوائد أعلى مما توقّع CAPM. فأضافوا عاملين فوق عامل السوق: SMB (الحجم = عائد الصغيرة ناقص الكبيرة) و HML (القيمة = عائد الرخيصة ناقص الغالية). ألفا الموجبة هون = أداء متفوّق بعد حسم العوامل الثلاثة.",h:"CAPM + عامل الحجم (SMB) + عامل القيمة (HML)."},{name:"توقيت السوق — ترينور ومازوي",tag:"Treynor-Mazuy · timing",f:"Rₚ − R_f = α + β(Rₘ − R_f) + δ(Rₘ − R_f)² + ε",s:"كيف تعرف إذا المدير بيعرف «يوقّت» السوق — يزيد المخاطرة قبل الصعود ويقلّلها قبل الهبوط؟ بتضيف حد تربيعي (Rₘ−R_f)². إذا معامله δ طلع موجب وذو دلالة = العلاقة صارت منحنية لفوق = المدير عنده مهارة توقيت فعلية.",h:"أضف حداً تربيعياً — δ موجبة تعني المدير يعرف يوقّت السوق."},{name:"الانتقائية الصافية — فاما",tag:"Fama · net selectivity",f:"NS = E(R)ₚ − E(R)ₓ",s:"فاما فكّك أداء المدير: الانتقائية الصافية = العائد اللي حققه فعلاً ناقص عائد محفظة متنوّعة بنفس المخاطرة الكلية (E(R)ₓ). الموجب يعني المدير اختار أسهم أفضل من مجرّد التعرّض للمخاطرة. والباقي (عائد التنويع) بيقيس الفايدة اللي أضافها التنويع.",h:"عائد المحفظة الفعلي − عائد محفظة متنوّعة بنفس المخاطرة."}]}],z0=`محفظة من سهمين:
