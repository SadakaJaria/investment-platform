red Promissory Notes) تصدرها الشركات الكبيرة المعروفة."},{q:"فترة استحقاق الأوراق التجارية تصل إلى:",options:["90 يوماً","270 يوماً","365 يوماً","سنتين"],correct:1,source:"تتراوح فترة استحقاق الأوراق التجارية ما بين أيام قليلة إلى 270 يوماً، وتُباع بخصم."},{q:"السعر الذي تُقرض به المصارف عملاءها المميزين يُسمّى:",options:["Prime Rate","Benchmark","Spread","Yield"],correct:0,source:"سعر الفائدة الأولى (Prime Rate): هو السعر الذي تقرض به المصارف التجارية عملاءها المميزين."},{q:"الضمان الأساسي للأوراق التجارية هو:",options:["أصول عقارية","ضمان حكومي","سمعة المنشأة وجدارتها الائتمانية","وديعة نقدية"],correct:2,source:"تمثل سمعة المنشأة وجدارتها الائتمانية الأساس في ضمان هذه الأوراق من قبل البنوك."},{q:"الأداة التي تُباع على أساس المردود (Yield) وليس الخصم مثل السند:",options:["أذونات الخزينة","الأوراق التجارية","شهادات الإيداع القابلة للتداول","القبولات المصرفية"],correct:2,source:"تختلف شهادات الإيداع في أنها مثل السند تُباع على أساس المردود Yield وليس على أساس الخصم Discount."},{q:"تُحسب الفائدة السنوية على شهادات الإيداع القابلة للتداول على أساس:",options:["360 يوماً","365 يوماً","180 يوماً","90 يوماً"],correct:1,source:"تُحسب الفائدة السنوية على شهادات الإيداع القابلة للتداول على أساس 365 يوماً بدلاً من 360 يوماً."},{q:"طريقة إصدار شهادات الإيداع بناءً على طلب العميل تُسمّى:",options:["Tranche Issue","Tap Issue","Overnight","Call Option"],correct:1,source:"الإصدار بناءً على طلب العميل (Tap Issue): تُصدر الشهادة بالمبلغ والمدة وسعر الفائدة المتفق عليها مع العميل."},{q:"طريقة الإصدار المعلن لشهادات الإيداع تُسمّى:",options:["Tap Issue","Tranche Issue","Repo","Prime Issue"],correct:1,source:"طريقة الإصدار المعلن (Tranche Issue): يعلن المصرف عن إصدار شهادات الإيداع ويدعو الجمهور للاكتتاب."},{q:"القبول المصرفي هو:",options:["أمر بالدفع مسحوب على مصرف من قبل عميل","وعد غير مؤكد بالدفع","إيصال إيداع","سند ملكية"],correct:0,source:"القبولات المصرفية: أمر بالدفع مسحوب على مصرف من قبل عميل معين، حيث يقبل البنك دفع مبلغ معين في تاريخ محدد."},{q:"ظهرت القبولات المصرفية أساساً لتنشيط:",options:["سوق العقارات","حركة التجارة الدولية","الإقراض الاستهلاكي","سوق الأسهم"],correct:1,source:"تُعتبر القبولات المصرفية من أقدم أدوات سوق النقد، وقد ظهرت أساساً لتنشيط حركة التجارة الدولية."},{q:"الفترة الأكثر شيوعاً لاستحقاق القبولات المصرفية:",options:["30 يوماً","90 يوماً","170 يوماً","270 يوماً"],correct:1,source:"تتراوح فترة استحقاقها عادة بين 30 إلى 170 يوماً، والفترة الأكثر شيوعاً هي 90 يوماً."},{q:"عند ارتفاع أسعار الفائدة على القروض المصرفية فإن حجم إصدار القبولات:",options:["يقل","يزيد","يثبت","ينعدم"],correct:1,source:"إذا ارتفعت أسعار الفائدة على القروض المصرفية يزيد حجم إصدار القبولات المصرفية."},{q:"في القبول المصرفي يتم خصم الفائدة:",options:["في نهاية المدة","مقدماً","على دفعات","لا يوجد خصم"],correct:1,source:"يتم تسعير القبولات المصرفية يومياً، حيث يتم خصم الفائدة مقدماً."},{q:"من شروط القبولات المصرفية أن تكون ناشئة عن:",options:["مضاربات في الأسهم","عمليات تجارية حقيقية (استيراد/تصدير)","قروض شخصية","إيداعات ادخارية"],correct:1,source:"من شروط القبولات المصرفية: أن تكون ناشئة عن عمليات تجارية حقيقية (استيراد أو تصدير)."},{q:"من شروط القبولات المصرفية ألا تتجاوز مدتها:",options:["90 يوماً","ستة أشهر","سنة واحدة","سنتين"],correct:2,source:"من شروط القبولات المصرفية: أن لا تتجاوز مدتها سنة واحدة."},{q:"تُقسم الأوراق المالية في سوق رأس المال إلى:",options:["قصيرة وطويلة الأجل","أدوات ملكية وأدوات دين","محلية وأجنبية","حكومية وخاصة"],correct:1,source:"تُقسم أوراق سوق رأس المال إلى نوعين: أدوات ملكية وتشمل الأسهم، وأدوات دين وتشمل السندات."},{q:"أدوات الدين في سوق رأس المال تشمل:",options:["الأسهم العادية","السندات","الأسهم الممتازة","حقوق الشراء"],correct:1,source:"أدوات الدين وتشمل السندات."},{q:"أسهم الشركات الكبيرة المعروفة التي توزّع أرباحاً بمعدل ثابت بغض النظر عن الأحوال الاقتصادية:",exam:"ف١ 24/25 · ف٢ 23/24",options:["أسهم النمو","الأسهم المرتفعة الجودة (Blue Chip)","أسهم الدخل","الأسهم الدورية"],correct:1,source:"الأسهم المرتفعة الجودة (Blue Chip): توزّع أرباحاً بمعدل ثابت بغض النظر عن الأحوال الاقتصادية (رواج، كساد)."},{q:"الأسهم التي تزداد أرباحها بنسبة أعلى من النمو الاقتصادي وتوزّع أرباحاً منخفضة نسبياً:",exam:"ف١ 24/25 · ف١ 23/24 · ف٢ 23/24",options:["أسهم الدخل","أسهم النمو (Growth)","الأسهم الدفاعية","Blue Chip"],correct:1,source:"أسهم النمو (Growth): تزداد أرباحها بنسبة أعلى من معدل النمو الاقتصادي، وتحتجز معظم الإيرادات فتوزّع أرباحاً منخفضة نسبياً."},{q:"الأسهم التي تولّد عائداً جارياً كبيراً وتدفع جزءاً كبيراً من دخلها كتوزيعات:",exam:"ف١ 23/24 · ف٢ 23/24",options:["أسهم النمو","أسهم الدخل (Income)","الدفاعية","الدورية"],correct:1,source:"أسهم الدخل (Income): تولّد عائداً جارياً كبيراً وتدفع جزءاً كبيراً من دخلها كتوزيعات."},{q:"الأسهم الأقل تأثراً بالركود مثل شركات الكهرباء والمياه هي:",exam:"ف١ 23/24 · ف١ 21/22",options:["الدورية","الأسهم الدفاعية (Defensive)","أسهم النمو","Blue Chip"],correct:1,source:"الأسهم الدفاعية (Defensive): أقل تأثراً بدورات النشاط الاقتصادي السيئة، مثل شركات الخدمات العامة (المياه، الكهرباء)."},{q:"أسهم شركات صناعة السيارات التي ترتبط أرباحها بدورة الأعمال مثال على:",exam:"ف٢ 23/24 · ف١ 21/22",options:["الأسهم الدفاعية","الأسهم الدورية (Cyclical)","أسهم الدخل","Blue Chip"],correct:1,source:"الأسهم المرتبطة بدورة الأعمال (Cyclical): مثالها أسهم شركات صناعة السيارات."},{q:"الورقة المالية التي تقع بين الأسهم العادية والديون:",options:["السندات","الأسهم الممتازة","الأوراق التجارية","أذون الخزينة"],correct:1,source:"الأسهم الممتازة: تقع بين الأسهم العادية والديون، وتُدفع توزيعاتها فقط في حال إقرار مجلس الإدارة."},{q:"توزيعات الأسهم الممتازة تُدفع فقط في حال:",options:["ارتفاع سعر السهم","إقرار مجلس الإدارة لها","نهاية السنة المالية","موافقة المصرف المركزي"],correct:1,source:"الأسهم الممتازة يتحدد لها توزيعات وتُدفع فقط في حال إقرار مجلس الإدارة لها."},{q:"حقوق الشراء التي يصدرها المستثمرون تُسمّى:",options:["Warrants","Call Option","Repos","Prime Rate"],correct:1,source:"من الأوراق غير التقليدية: حقوق الشراء التي يصدرها المستثمرون (Call Option)."},{q:"حقوق الشراء التي تصدرها الشركات تُسمّى:",options:["Call Option","Warrants","Benchmark","Spread"],correct:1, ر، ويقيس هذا المؤشر التشتت (Dispersion) حول القيمة المتوقعة."},{q:"العلاقة بين قيمة الانحراف المعياري ودرجة المخاطر هي:",exam:"ف١ 21/22",options:["عكسية","طردية","لا علاقة","ثابتة"],correct:1,source:"كلما ازدادت قيمة الانحراف المعياري كلما كانت المخاطر مرتفعة، فهناك علاقة طردية بين قيمة الانحراف المعياري ودرجة المخاطر."},{q:"في حساب الانحراف المعياري، نقسم على (n−1) في حالة:",options:["المجتمع الأصلي","عيّنة من الأسهم","دائماً","لا نقسم أبداً"],correct:1,source:"القسمة على (n−1) في حالة عيّنة من الأسهم، أما في حالة المجتمع الأصلي فإن (1/(n−1)) تتحول إلى (1/n)."},{q:"وفقاً لمقياس معامل الاختلاف، الاستثمار الأفضل هو صاحب:",exam:"ف١ 25/26 · ف٢ 24/25 · ف١ 21/22",options:["أعلى معامل اختلاف","أقل معامل اختلاف","أعلى انحراف معياري","أعلى عائد فقط"],correct:1,source:"يرتبط قبول المقترح الاستثماري بأقل قيمة للانحراف المعياري (أقل درجة للمخاطرة) طالما أن العوائد متساوية. ومعامل الاختلاف مقياس نسبي للتشتت يفيد في مقارنة مخاطر الاستثمار."},{q:"وفق قاعدة التوزيع الطبيعي، تقع ضمن ±1σ نسبة:",options:["95.46%","68.26%","99.74%","50%"],correct:1,source:"بالنسبة لتوزيع احتمالي طبيعي، يوجد احتمال 68.26% أن يقع العائد المحقق ما بين −1 و +1 انحراف معياري، ويزداد إلى 95.46% عند ±2، ويصل إلى 99.74% عند ±3."},{q:"تُقسم مخاطر الاستثمار بشكل عام إلى:",options:["قصيرة وطويلة","منتظمة وغير منتظمة","محلية وأجنبية","كبيرة وصغيرة"],correct:1,source:"تقسم مخاطر الاستثمار بشكل عام إلى نوعين: مخاطر منتظمة (Systematic) ومخاطر غير منتظمة (Nonsystematic)."},{q:"المخاطر التي تطال السوق ككل ولا يمكن الحد منها بالتنويع هي:",exam:"ف٢ 24/25",options:["غير المنتظمة","المنتظمة (السوقية)","مخاطر الإدارة","مخاطر الصناعة"],correct:1,source:"المخاطر المنتظمة (السوقية): عوامل تؤثر في الأوراق المالية بوجه عام وتؤثر على نظام السوق ككل، ولا يمكن الحد منها عن طريق التنويع في المحفظة."},{q:"المخاطر التي تتعلق بشركة أو قطاع معين ويمكن الحد منها بالتنويع:",options:["المنتظمة","غير المنتظمة (الخاصة)","السوقية","مخاطر التضخم"],correct:1,source:"المخاطر غير المنتظمة (غير السوقية): ناتجة عن عوامل تتعلق بشركة أو قطاع معين، فهي لا تؤثر على السوق ككل، ويمكن الحد منها عن طريق التنويع."},{q:"من أمثلة المخاطر المنتظمة:",options:["إضراب عمالي في شركة","معدلات التضخم والحروب","خطأ إداري","ظهور منافس جديد"],correct:1,source:"المخاطر المنتظمة ترتبط بالظروف الاقتصادية والسياسية والاجتماعية كالاضطرابات العامة أو حالات الكساد أو معدلات التضخم أو أسعار الفائدة أو الحروب."},{q:"من أمثلة المخاطر غير المنتظمة:",options:["التضخم","إضراب عمالي وأخطاء إدارية","الكساد العام","الحروب"],correct:1,source:"أمثلة المخاطر غير المنتظمة: حدوث إضراب عمالي، الأخطاء الإدارية، ظهور اختراعات جديدة، التغير في أذواق المستهلكين، ظهور منافسين جدد."},{q:"العلاقة بين سعر الفائدة السوقية وأسعار السندات هي:",options:["طردية","عكسية","لا علاقة","متساوية"],correct:1,source:"ارتفاع سعر الفائدة يؤدي دائماً إلى انخفاض أسعار السندات، لأن المستثمر العادي في هذه الحالة يفضل بيع الأوراق التي يمتلكها ووضع ثمنها كوديعة في أحد البنوك مما سيدر عليه عائداً أعلى."},{q:"الأوراق المالية الأكثر تعرّضاً لمخاطر أسعار الفائدة هي:",options:["الأسهم العادية","الأوراق ذات الدخل الثابت كالسندات","أذون الخزينة قصيرة الأجل","العملات"],correct:1,source:"الأوراق المالية ذات الدخل الثابت كالسندات تكون أكثر عرضة لمخاطر أسعار الفائدة السوقية من الأوراق ذات الدخل المتغير كالأسهم العادية."},{q:"كلما طال أجل استحقاق الورقة المالية، فإن تعرّضها لخطر أسعار الفائدة:",options:["يقل","يزداد","يثبت","ينعدم"],correct:1,source:"بشكل عام كلما طال أجل استحقاق الورقة المالية ازداد تعرضها لخطر أسعار الفائدة."},{q:"مخاطر انخفاض القوة الشرائية للنقود تنتج عن:",options:["الكساد","التضخم وارتفاع معدلاته","إضراب العمال","تغيّر الإدارة"],correct:1,source:"مخاطر انخفاض القوة الشرائية: ناتجة عن احتمال حدوث انخفاض في القوة الشرائية للنقود نتيجة وجود حالة تضخم وارتفاع معدلاته."},{q:"الاستثمار الذي يوفّر حماية للمستثمر من مخاطر القوة الشرائية غالباً هو:",options:["السندات طويلة الأجل","الأسهم العادية","الودائع لأجل","شهادات الإيداع"],correct:1,source:"يشكّل الاستثمار في الأسهم العادية في معظم الأحيان حماية للمستثمر من مخاطر القوة الشرائية، لأن أسعار الأسهم تستجيب غالباً للظروف التضخمية فترتفع، مما يحافظ على القيمة الحقيقية للاستثمار."},{q:"المخاطر التي يتعرّض لها حملة الأسهم العادية أكثر من غيرهم وتتأثر بالعوامل النفسية:",exam:"ف٢ 24/25",options:["مخاطر الفائدة","مخاطر السوق","مخاطر القوة الشرائية","مخاطر الإدارة"],correct:1,source:"مخاطر السوق: تتمثل بتلك المخاطر التي تصاحب وقوع أحداث غير متوقعة، ويكون تعرّض حملة الأسهم العادية لهذا النوع أكثر من غيرهم. وتتأثر أيضاً بالعوامل النفسية كالجري خلف حالات الذعر والإشاعات."},{q:"من مصادر المخاطر غير المنتظمة:",exam:"ف١ 25/26",options:["مخاطر التضخم وأسعار الفائدة","مخاطر الإدارة ومخاطر الصناعة","مخاطر السوق","الحروب والكساد"],correct:1,source:"من أهم مصادر المخاطر غير المنتظمة: مخاطر الإدارة ومخاطر الصناعة."},{q:"الأخطاء الإدارية التي قد تُحدث انخفاضاً في العائد حتى في حالات ازدهار الاقتصاد تُصنّف ضمن:",options:["المخاطر المنتظمة","المخاطر غير المنتظمة","مخاطر السوق","مخاطر الفائدة"],correct:1,source:"تدخل المخاطر الناجمة عن الأخطاء الإدارية ضمن المخاطر غير المنتظمة، لأنها قد تُحدث انخفاضاً في معدل العائد حتى في حالات ازدهار النشاط الاقتصادي."},{q:"رافعة التشغيل (DOL) ترتبط بدرجة وجود:",options:["الديون في هيكل التمويل","التكاليف الثابتة في هيكل التكاليف","التوزيعات النقدية","المخاطر السوقية"],correct:1,source:"تتعلق رافعة التشغيل بالدرجة التي توجد فيها تكاليف ثابتة في هيكل تكاليف الشركة (الوزن النسبي للتكاليف الثابتة في التكاليف الكلية)."},{q:"الشركات ذات رافعة التشغيل العالية تعمل عادة في صناعات مثل:",options:["التجزئة والخدمات","الطيران والإسمنت والحديد","الاستشارات","البرمجيات"],correct:1,source:"تنطبق خاصية رافعة التشغيل العالية على الشركات التي تعمل في صناعات تغلب عليها الكثافة الرأسمالية مثل شركات الطيران ومعامل الإسمنت ومعامل الحديد ومصافي البترول."},{q:"رافعة التمويل (DFL) تنشأ عن التمويل عن طريق:",options:["التمويل الداخلي","الاقتراض (أموال الغير)","إصدار الأسهم","الأرباح المحتجزة"],correct:1,source:"ينشأ عن التمويل الخارجي (عن طريق الاقتراض) ما يسمى مخاطر الرفع المالي، ويهدف إلى استخدام أموال الغير في رفع معدل العائد على الاستثمار."},{q:"الرافعة المشتركة (CL) تساوي:",options:["DFL + DOL", σ²=0.0324+0.0288+0.0064=0.0676 → σ=0.26`}]},{id:"ch4",num:"الرابع",title:"النظرية الحديثة لإدارة المحفظة والتحليل الاستثماري",kind:"نظري + عملي",quiz:[{q:"المحفظة المالية هي تشكيلة تتكوّن من:",options:["ورقة مالية واحدة","أصلين أو أكثر تخضع لمدير المحفظة","أصول حقيقية فقط","نقد فقط"],correct:1,source:"المحفظة المالية هي بمثابة تشكيلة من أدوات الاستثمار قد تتكوّن من أصلين أو أكثر، وتخضع لإدارة شخص مسؤول عنها يسمى مدير المحفظة (Portfolio Manager)."},{q:"أول من وضع نظرية المحفظة الحديثة هو:",exam:"ف١ 24/25",options:["Sharp","Markowitz عام 1952","Turner","Conen"],correct:1,source:"تُنسب نظرية المحفظة إلى Markowitz الذي وضعها عام 1952، ثم تناولها بعده بالدراسة والتطوير كلٌّ من Sharp وConen وTurner وغيرهم."},{q:"أهم قرار استراتيجي لمدير المحفظة هو:",options:["قرار التوقيت","قرار المزج (Major Mix)","قرار البيع","قرار السيولة"],correct:1,source:"من أهم القرارات الاستراتيجية لمدير المحفظة ما يُعرف بقرار المزج الرئيسي (Major Mix Decision) الذي يتم بموجبه تحديد التركيبة الأساسية لأصول المحفظة."},{q:"القرار الذي يُغيّر الوزن النسبي لأصول المحفظة لاحقاً يُسمّى:",options:["قرار المزج","قرار التوقيت (التوزيع النشط)","قرار السيادة","قرار التنويع"],correct:1,source:"قرار التوقيت (Timing Decision): الغرض منه تغيير الوزن النسبي لأصول المحفظة عن طريق التخلص من بعضها وإضافة بعضها الآخر، ويُطلق عليه التوزيع النشط للأصول (Active Allocation)."},{q:"من فرضيتي نظرية ماركويتز:",options:["احتواء المحفظة على أصول خالية من المخاطر","عدم الاعتماد على الاقتراض في تكوين المحفظة","الاعتماد على الاقتراض بكثافة","استبعاد الأسهم نهائياً"],correct:1,source:"تقوم نظرية ماركويتز على فرضيتين: عدم احتواء المحفظة المثلى على أصول خالية من المخاطر، وعدم الاعتماد على الاقتراض في تكوين المحفظة."},{q:"وفق مبدأ السيادة، عند تساوي العائد المتوقع بين بديلين يُقبل:",exam:"ف١ 23/24 · ف٢ 23/24",options:["الأعلى مخاطرة","الأقل مخاطرة","الأعلى عائداً","أيّهما"],correct:1,source:"يعتمد مبدأ السيادة على قبول البديل ذي المخاطرة الأقل في حال تساوي العائد المتوقع منهما."},{q:"وفق مبدأ السيادة، عند تساوي المخاطرة بين بديلين يُقبل:",exam:"ف١ 23/24 · ف٢ 23/24",options:["الأقل عائداً","الأعلى عائداً","الأعلى مخاطرة","أيّهما"],correct:1,source:"في حال تساوي المخاطرة وعدم تساوي العوائد المتوقعة يتم قبول البديل الاستثماري ذي العائد الأعلى."},{q:"المحفظة التي تركّز على أوراق تعطي دخلاً سنوياً عالياً هي:",options:["محفظة النمو","محفظة الدخل","المحفظة المتخصصة","المحفظة الهجومية"],correct:1,source:"تركّز محفظة الدخل على الأوراق المالية التي تعطي دخلاً سنوياً عالياً، سواء كان مصدره توزيعات الأرباح النقدية لحملة الأسهم أو الفوائد التي تدفع لحملة السندات."},{q:"المحفظة التي تركّز على أدوات تحقق إيرادات رأسمالية تنمّي أموال المحفظة:",options:["محفظة الدخل","محفظة النمو","المحفظة المتوازنة","المحفظة المتخصصة"],correct:1,source:"تركّز محفظة النمو على أدوات الاستثمار التي تحقق إيرادات رأسمالية تؤدي إلى نمو أموال المحفظة وزيادتها."},{q:"المحفظة التي تتكوّن من أسهم عادية وممتازة وسندات معاً هي:",options:["محفظة الدخل","المحفظة المتوازنة","محفظة النمو","المحفظة المتخصصة"],correct:1,source:"المحفظة المتوازنة تتكوّن عادةً من أسهم عادية وممتازة وسندات، حيث يأمل المستثمر بأرباح رأسمالية وتوزيعات نقدية وفوائد مع المحافظة على رأس ماله."},{q:"المحفظة التي تتخصص بأسهم شركات صناعية مختارة (كالطيران والطاقة) هي:",options:["محفظة الدخل","المحفظة المتخصصة في الصناعات","المحفظة المتوازنة","محفظة النمو"],correct:1,source:"المحفظة المتخصصة في الصناعات: تتخصص في الاستثمار بأسهم شركات صناعية مختارة مثل شركات الطيران أو الموارد الطبيعية أو الشركات المتعلقة بالطاقة والنفط."},{q:"الميزة الرئيسية لتكوين المحافظ الاستثمارية هي:",options:["المضاربة","التنويع (Diversification)","الاقتراض","المتاجرة اليومية"],correct:1,source:"إن الميزة الرئيسية لتكوين المحافظ الاستثمارية هي التنويع (Diversification)، أي تمكين المستثمر من اختيار تشكيلة الأصول بهدف تخفيض المخاطرة."},{q:"مقولة «لا تضع كل بيضك في سلة واحدة» تعبّر عن:",exam:"ف١ 24/25 · ف١ 23/24 · ف٢ 23/24",options:["تنويع ماركويتز","التنويع الساذج (Naive)","تنويع الاستحقاق","التنويع الدولي"],correct:1,source:"يقوم أسلوب التنويع الساذج على الحكمة التي تقول: لا تضع كل ما تملكه من بيض في سلة واحدة (Not putting all the eggs in one basket)."},{q:"وفق دراسة Evans & Archer، العدد الذي يتخلص عنده من الجزء الأكبر من المخاطر غير المنتظمة هو:",exam:"ف١ 23/24 · ف٢ 23/24",options:["5 أوراق","حوالي 15 ورقة","50 ورقة","100 ورقة"],correct:1,source:"تشير دراسة Evans and Archer 1968 إلى أن احتواء المحفظة على حوالي 15 ورقة مالية كحد أقصى يؤدي إلى التخلص من الجزء الأكبر من المخاطر غير المنتظمة."},{q:"المخاطر التي يتخلص منها التنويع تدريجياً هي:",options:["المنتظمة","غير المنتظمة","كلاهما","لا شيء"],correct:1,source:"المخاطر المنتظمة تُمثّل على شكل خط مستقيم لا يمكن التخلص منها بالتنويع مهما زاد عدد الأوراق، والمخاطر غير المنتظمة تتناقص تدريجياً كلما زاد عدد الأسهم."},{q:"يعتمد تنويع ماركويتز أساساً على:",options:["عدد الأوراق فقط","معامل الارتباط بين العوائد","حجم الاستثمار","نوع القطاع"],correct:1,source:"يقوم أسلوب ماركويتز على الاختبار الدقيق للاستثمارات المكوّنة للمحفظة من خلال الاعتماد على معامل الارتباط (P) بين العوائد الناتجة عن الاستثمار."},{q:"عند معامل ارتباط ρ = +1 (موجب تام)، فإن بناء المحفظة:",options:["يخفّض المخاطرة لأدنى حد","لا يؤدي إلى تخفيض المخاطرة","يلغي المخاطرة","يضاعف العائد"],correct:1,source:"في حالة الارتباط الموجب التام، بناء محفظة من السهمين لا يؤدي إلى تخفيض المخاطرة، فتكون مخاطرة المحفظة متوسطاً مرجّحاً لمخاطرة السهمين معاً."},{q:"القاعدة التي يرتكز عليها مبدأ التحوّط (التأمين ضد المخاطر) هي عند:",options:["ρ = +1","ρ = −1","ρ = 0","ρ = 0.5"],correct:1,source:"في الحالة الثالثة عندما يكون معامل الارتباط −1 فإن ذلك يمكن أن يؤدي إلى التخلص من المخاطرة للمحفظة بشكل نهائي، وهذه هي القاعدة التي يرتكز عليها مبدأ التحوّط (التأمين ضد المخاطر)."},{q:"عندما يكون معامل الارتباط ρ = 0، فإن مخاطرة المحفظة:",options:["في أعلى مستوياتها","معدومة","تقع بين الحد الأدنى والأعلى","مساوية لعائدها"],correct:2,source:"مخاطرة المحفظة تكون في أعلى مستوياتها عند ρ=+1، ومعدومة عند ρ=−1، وتقع بين الحد الأدنى والأعلى عندما يكون معامل الارتباط مساوياً للصفر."},{q:"في تنويع تواريخ الاستحقاق، الاستثمارات قصيرة الأجل تسهم أساساً في:",options:["استقرار العائد","توفير السيولة","الأرباح الرأسمالية","زيادة المخاطر"],correct:1,source:"الاستثمارات قصيرة الأجل تسهم في توفير السيولة، بينما الاستثمارات طويلة الأجل توفّر فرصة تحقيق أرباح رأسمالية في حالة انخفاض سعر الفائدة."},{q:"الأسلوب الذي يوزّع الاستثمارات على أوراق بتواريخ استحقاق متتالية يُسمّى:",options:["الهجومي","تدرّج تواريخ الاستحقاق (Laddered)","Barbell","الدولي"],correct:1,source:"أسلوب تدرّج تواريخ الاستحقاق (Laddered Maturity): يقوم المستثمر بتوزيع استثماراته بالتساوي على أوراق مالية بتواريخ استحقاق متتالية."},{q:"أسلوب التركيز على القصير والطويل واستبعاد متوسط الأجل يُسمّى:",options:["Laddered","Barbell","الهجومي","الساذج"],correct:1,source:"أسلوب Barbell: التركيز على الاستثمارات قصيرة الأجل وطويلة الأجل واستبعاد الأوراق المالية متوسطة الأجل."},{q:"شرط أن يؤدي التنويع الدولي إلى تقليل المخاطر هو أن يكون معامل الارتباط بين العوائد المحلية والأجنبية:",exam:"ف١ 25/26 · ف٢ 24/25 · ف١ 23/24 · ف٢ 23/24",options:["موجباً تاماً (+1)","صفراً أو سالباً أو موجباً غير تام","مساوياً للعائد","أكبر من 1"],correct:1,source:"إن التنويع الدولي يؤدي إلى التقليل من المخاطر إذا كان معامل الارتباط بين العائد على الأوراق المحلية والأجنبية صفراً أو سالباً أو موجباً غير تام."},{q:"قاعدة المحفظة في الاستراتيجية الهجومية هي:",options:["أذون الخزينة 60-80%","الأسهم العادية 80-90%","السندات 100%","الذهب"],correct:1,source:"الاستراتيجية الهجومية (Aggressive) يتبناها مديرو المحافظ الذين يفضّلون العائد على الأمان، والنموذج الشائع لها معروف بمحفظة رأس المال، وتكون قاعدتها الأساسية الأسهم العادية بنسب 80-90%."},{q:"قاعدة المحفظة في الاستراتيجية الدفاعية تتكوّن أساساً من:",options:["أسهم عادية 90%","أذون خزينة وأسهم ممتازة 60-80%","سندات أجنبية فقط","عملات"],correct:1,source:"الاستراتيجية الدفاعية (Defensive) يتبناها المحافظون جداً تجاه المخاطرة، ونموذجها الشائع محفظة الدخل، وتتكوّن قاعدتها الأساسية من أذون الخزينة والأسهم الممتازة بنسب 60-80%."},{q:"الاستراتيجية التي تعتبر وسطاً بين الهجومية والدفاعية هي:",options:["المتوازنة (Aggressive-Defensive)","الساذجة","الدولية","المتخصصة"],correct:0,source:"الاستراتيجية المتوازنة (Aggressive-Defensive) تعتبر وسطاً بين النمطين السابقين، ويتبناها مديرو المحافظ الذين يراعون تحقيق استقرار نسبي، وتتكوّن قاعدتها من تشكيلة متوازنة."},{q:"محفظة: 80% في الورقة أ (σ=6%) و20% في الورقة ب (σ=15%)، بارتباط تام موجب ρ=+1. الانحراف المعياري للمحفظة يساوي:",options:["6%","7.8%","13.2%","15%"],correct:1,ref:"prho",fast:"الحالة الخاصة: شوف قيمة ρ. عند ρ=+1: σ = w₁σ₁ + w₂σ₂ (جمع مباشر، أعلى مخاطرة).",law:"عند ρ=+1: σₚ = w₁σ₁ + w₂σ₂  (لا يوجد تنويع)",solution:`σₚ = (0.80 × 6) + (0.20 × 15)

أدوات الاستثمار المتاحة:",options:["خالية من المخاطر","جميعها من النوع الخطر","سندات فقط","أسهم فقط"],correct:1,source:"يُرسم الحد الكفّال مع مراعاة افتراض أن جميع أدوات الاستثمار المتاحة هي فقط من النوع الخطر، حيث لا يوجد بينها أدوات استثمارية خالية من المخاطر."},{q:"المحافظ الواقعة في القطاع الأعلى على يسار المنحنى الكفء تُسمّى:",options:["المحافظ الممكنة (Feasible)","المحافظ غير الممكنة (Infeasible)","المحافظ المثلى","المحافظ الخطرة"],correct:1,source:"القطاع الأعلى الموجود على يسار المنحنى يمثل مجموعة المحافظ غير المتاحة أو غير الممكنة بالنسبة للمستثمر (Infeasible Portfolios)، والقطاع الأدنى على يمينه يمثل المحافظ المتاحة (Feasible)."},{q:"المنحنيات التي تعكس ميول المستثمر في مقايضة العائد بالمخاطرة تُسمّى:",options:["الحد الكفء","منحنيات السواء (Indifference Curves)","خطوط السوق","منحنيات الطلب"],correct:1,source:"لا بد من الاستعانة بمفهوم اقتصادي آخر هو مفهوم منحنيات السواء (Indifference Curves) التي تعكس شكل خريطة سواء المستثمر التي تعكس ميوله أو سلوكه في مقايضة العائد بالمخاطرة."},{q:"كلما ارتفع منحنى السواء (للأعلى) دلّ ذلك على:",options:["مخاطرة أقل","مستوى إشباع أعلى للمستثمر","عائد أقل","سيولة أعلى"],correct:1,source:"منحنيات السواء تتجه من أسفل إلى أعلى ومن اليسار إلى اليمين، وكلما ارتفع مستوى منحنى السواء دلّ ذلك على مستوى إشباع أعلى للمستثمر."},{q:"على خريطة السواء، المستثمر A يقبل 14% بمخاطرة 6% وB يقبل 8% بمخاطرة 10%. المستثمر الأكثر تحفظاً هو:",options:["المستثمر B","المستثمر A","متساويان","لا يمكن التحديد"],correct:1,source:"المستثمر A أكثر تحفظاً تجاه المخاطرة من المستثمر B، حيث يقبل B الحصول على عائد 8% مقابل درجة مخاطرة 10%، في حين أن المستثمر A العائد المقبول له 14% بدرجة مخاطرة 6%."},{q:"تتحدد المحفظة المثلى بيانياً عند:",options:["أعلى نقطة على منحنى السواء","نقطة التماس بين منحنى سواء المستثمر والحد الكفء","نقطة العائد الخالي من المخاطرة","منتصف المنحنى"],correct:1,source:"تتحدد المحفظة المثلى للمستثمر عند نقطة التماس (Point of Tangency) لأحد منحنيات سواء المستثمر مع الحد الفعّال أو منحنى المحافظ المثلى، أي في النقطة M."},{q:"في حالة السماح بالبيع على المكشوف، تقع المحفظة المثلى على:",options:["منحنى السواء الأدنى","الخط المستقيم R_f B الملامس للمنحنى والمار من نقطة العائد الخالي من المخاطرة","المحور الأفقي","أي نقطة عشوائية"],correct:1,source:"المحفظة الواقعة على الخط المستقيم R_f B الملامس للمنحنى الكفء والمار من نقطة العائد الخالي من المخاطرة هي المحفظة المفضّلة بالنسبة لباقي المحافظ الخطرة."},{q:"دالة الهدف التي تُعظّم لبناء المحفظة المثلى هي:",options:["F = R̄ₚ × σₚ","F = (R̄ₚ − R_f) ÷ σₚ","F = σₚ ÷ R̄ₚ","F = R̄ₚ + R_f"],correct:1,source:"المحفظة المثلى هي تلك المحفظة التي يمكنها أن تحل مشكلة تعظيم دالة الهدف: F = (R̄ₚ − R_f) ÷ σₚ، وهي تمثل ميل الخط الملامس للمنحنى الكفء (النسبة الأعلى من العائد)."},{q:"شروط كوين-تاكر (Kuhn-Tucker) تُستخدم في حالة:",options:["السماح بالبيع على المكشوف","عدم السماح بالبيع على المكشوف","عدم وجود مخاطرة","وجود أصل خالٍ من المخاطر فقط"],correct:1,source:"في ظل فرضية إمكانية الإقراض والاقتراض وفي حال عدم إمكانية البيع على المكشوف، تكون المشكلة برمجة تربيعية، ويمكن استخدام شروط كوين-تاكر لإيجاد الحل الأمثل."},{q:"عدد شروط كوين-تاكر:",options:["شرطان","ثلاثة","أربعة","خمسة"],correct:2,source:"شروط كوين-تاكر هي عبارة عن أربعة شروط: ∂F/∂wᵢ + uᵢ = 0، وwᵢuᵢ = 0، وwᵢ ≥ 0، وuᵢ ≥ 0."},{q:"سبب كون مشكلة بناء المحفظة برمجة تربيعية (Quadratic) هو أن مخاطرة المحفظة تحتوي على:",options:["العائد فقط","الحد التربيعي w² وحاصل wᵢwⱼ","سعر الفائدة","التوزيعات"],correct:1,source:"مخاطرة المحفظة تحتوي على الحد التربيعي w² وتحتوي أيضاً على wᵢwⱼ، وهذا الأمر يجعل من دالة الهدف دالة تربيعية (Quadratic Function)."},{q:"في الحالة الثالثة (عدم إمكانية الإقراض والاقتراض)، تُحل المشكلة عن طريق:",options:["تعظيم العائد فقط","تصغير مخاطرة المحفظة بقيود","إلغاء التنويع","شراء أصل خالٍ من المخاطر"],correct:1,source:"في حالة عدم إمكانية الإقراض والاقتراض بسعر خالٍ من المخاطرة، يتحدد الحد الفعّال عن طريق تخفيض مخاطر المحفظة إلى أقل ما يمكن (MinF) بناءً على مجموعة من القيود."},{q:"القيد الذي يُضاف لضمان حد أدنى من العائد المطلوب هو:",options:["Σwᵢ = 0","Σwᵢdᵢ ≥ D","wᵢ < 0","σₚ = 0"],correct:1,source:"يمكن إدراج قيود أخرى كأن ندرج مثلاً الحد الأدنى من العوائد المطلوبة من قبل المستثمر، فيُضاف القيد: Σwᵢdᵢ ≥ D، حيث dᵢ معدل العائد على الورقة وD الحد الأدنى المطلوب."},{q:"الوزن النسبي wₖ بعد حل جملة المعادلات يُحسب بالعلاقة:",options:["wₖ = yₖ × Σyᵢ","wₖ = yₖ ÷ Σyᵢ","wₖ = Σyᵢ ÷ yₖ","wₖ = yₖ − Σyᵢ"],correct:1,source:"لإيجاد النسبة المستثمرة في كل أصل نعتمد على الصيغة: wₖ = yₖ ÷ Σyᵢ."},{q:"شرط عدم السماح بالبيع على المكشوف يعني أن الوزن wᵢ:",options:["يمكن أن يكون سالباً","لا يمكن أن يكون سالباً (wᵢ ≥ 0)","يساوي صفراً دائماً","أكبر من 1"],correct:1,source:"تقتضي حالة عدم السماح بالبيع على المكشوف أنه لا يمكن أن تكون wᵢ سالبة (wᵢ ≥ 0)."}],formulas:[]},{id:"ch7",num:"السابع",title:"نموذج تسعير الأصول الرأسمالية CAPM ونظرية المراجحة APT",kind:"نظري + عملي",quiz:[{q:"الفضل في استحداث نموذج تسعير الأصول الرأسمالية CAPM يعود بشكل أساسي إلى:",exam:"ف١ 24/25",options:["هاري ماركويتز","وليم شارب (Sharpe)","ستيفن روس","يوجين فاما وحده"],correct:1,source:"يعود الفضل في استحداث هذا النموذج إلى وليم شارب (Sharpe, 1964)، وكذلك جون لينتنر (Lintner, 1965) وجان موسين (Mossin, 1966) وايغون فاما (Fama, 1968)."},{q:"من فروض نموذج CAPM أن تقييم المستثمر للورقة المالية يمتد لفترة:",options:["غير محددة","واحدة فقط (One-Period)","خمس سنوات","لا نهائية"],correct:1,source:"من فروض النموذج أن تقييم المستثمر للورقة المالية يمتد لفترة واحدة فقط (One-Period)."},{q:"ليس من فروض نموذج CAPM:",options:["توقعات المستثمرين متشابهة عن العوائد والمخاطر","لا توجد تكاليف معاملات ولا ضرائب","المستثمر محبٌّ للمخاطرة","يمكن الإقراض والاقتراض بمعدل خالٍ من المخاطر"],correct:2,source:"من فروض النموذج أن المستثمر بطبيعته يكره المخاطر (وليس محباً لها)، وأن توقعاته متشابهة، ولا توجد تكاليف معاملات أو ضرائب، ويمكن الإقراض والاقتراض بمعدل خالٍ من المخاطرة."},{q:"خط سوق رأس المال (CML) يمثل العلاقة بين العائد والمخاطرة لـ:",options:["كل الأوراق كفوءة أو غير كفوءة","المحافظ الكفوءة فقط في حالة التوازن","الأصول الخالية من المخاطر فقط","الأسهم دون السندات"],correct:1,source:"خط سوق رأس المال (CML) يمثل العلاقة بين العائد المتوقع والمخاطرة لأية محفظة كفوءة عندما يكون سوق رأس المال في حالة التوازن."},{q:"معادلة خط سوق رأس المال (CML) هي:",options:["E(R)ₚ = R_f + β(Rₘ−R_f)","E(R)ₚ = R_f + λ·σ(R)ₚ","E(R)ₚ = λ ÷ σₚ","E(R)ₚ = Rₘ × σₚ"],correct:1,ref:"cml",fast:"CML لمّا تشوف «محفظة كفوءة» + «المخاطرة الكلية σ»: E(R) = R_f + λσ. λ يُضرب بالانحراف الكلي (مش بيتا).",law:"E(R)ₚ = R_f + λ·σ(R)ₚ",solution:"العائد المتوقع لمحفظة كفوءة = العائد الخالي من المخاطرة R_f + (سعر الخطر التوازني λ × مخاطرة المحفظة σ). λ يُضرب بالمخاطرة الكلية σ للمحفظة."},{q:"سعر الخطر التوازني λ (Lambda) في سوق رأس المال يُحسب بالعلاقة:",options:["(Rₘ − R_f) ÷ σₘ","(Rₘ − R_f) ÷ βₘ","σₘ ÷ Rₘ","Rₘ × σₘ"],correct:0,ref:"lambda",fast:"λ = (Rₘ − R_f) ÷ σₘ. هو ميل خط CML: علاوة خطر السوق مقسومة على انحراف السوق.",law:"λ = (Rₘ − R_f) ÷ σₘ",solution:"λ هو العائد الإضافي المطلوب لكل وحدة خطر، ويُساوي علاوة الخطر (Rₘ−R_f) مقسومة على مخاطرة محفظة السوق σₘ، وهو ميل خط سوق رأس المال."},{q:"(مثال) العائد المتوقع على محفظة السوق = 18%، العائد الخالي من المخاطرة = 6%، المخاطرة على محفظة السوق = 30%. سعر الخطر λ يساوي:",options:["0.40","0.12","0.30","2.50"],correct:0,ref:"lambda",fast:"عوّض مباشرة: (18 − 6) ÷ 30 = 0.40. انتبه أن الوحدات موحّدة (نسب مئوية).",law:"λ = (Rₘ − R_f) ÷ σₘ",solution:`λ = (0.18 − 0.06) ÷ 0.30 = 0.12 ÷ 0.30 = 0.40

)ᵢ = Rₘ + βᵢR_f","E(R)ᵢ = βᵢ ÷ (Rₘ − R_f)"],correct:1,ref:"sml",fast:"SML/CAPM لمّا تشوف «العائد المطلوب» + «بيتا»: E(R) = R_f + β(Rₘ − R_f). β يُضرب بعلاوة خطر السوق.",law:"E(R)ᵢ = R_f + βᵢ·(Rₘ − R_f)",solution:"العائد المتوقع = العائد الخالي من المخاطرة + علاوة المخاطرة. علاوة المخاطرة = βᵢ مضروبة بعلاوة خطر السوق (Rₘ−R_f). العلاقة طردية: كلما زادت بيتا زاد العائد المطلوب."},{q:"الفرق الجوهري بين خط سوق رأس المال (CML) وخط سوق الورقة المالية (SML):",exam:"ف١ 24/25 · ف١ 21/22",options:["لا فرق بينهما","CML يستخدم المخاطرة الكلية σ وللمحافظ الكفوءة فقط، أما SML فيستخدم بيتا (المخاطر المنتظمة) ولكل الأوراق","SML للأصول الخالية من المخاطر فقط","CML يستخدم بيتا وSML يستخدم σ"],correct:1,source:"CML يقيس العلاقة بالمخاطرة الكلية σ ويصلح للمحافظ الكفوءة فقط؛ أما SML فيقيس العلاقة بالمخاطر المنتظمة (بيتا) ويصلح لكل الأوراق سواء أكانت كفوءة أم غير كفوءة."},{q:"(مثال) بيتا سهم = 0.9، العائد الخالي من المخاطرة = 5%، العائد المتوقع على السوق = 12%. العائد المتوقع على السهم حسب CAPM يساوي:",exam:"ف١ 24/25 · ف٢ 24/25 · ف١ 23/24",options:["11.3%","12%","10.8%","6.3%"],correct:0,ref:"sml",fast:"عوّض بالترتيب: R_f + β × (Rₘ − R_f) = 5 + 0.9 × (12 − 5). احسب القوس أول.",law:"E(R)ᵢ = R_f + βᵢ(Rₘ − R_f)",solution:`E(R)ᵢ = 0.05 + 0.9(0.12 − 0.05) = 0.05 + 0.9×0.07 = 0.05 + 0.063 = 0.113 = 11.3%

ة المراجحة نموذج العوامل (Factor Model)، ويُقصد به العوامل الاقتصادية الرئيسية التي تؤثر على أسعار الأوراق المالية (مثل التضخم وسعر الفائدة والناتج المحلي الإجمالي…)."},{q:"وفق نظرية المراجحة APT، يتأثر العائد على الأوراق المالية بنوعين من العوامل هما:",options:["الربح والخسارة","عوامل اقتصادية عامة (عوامل السوق) + عوامل خاصة بالمنشأة","بيتا وألفا فقط","السيولة والأمان"],correct:1,source:"حسب نظرية المراجحة يتأثر العائد بنوعين: عوامل اقتصادية عامة (عوامل السوق التي تمثل المخاطر المنتظمة مثل التضخم وسعر الفائدة)، وعوامل خاصة بالمنشأة المصدرة للأوراق المالية."},{q:"الفرق الجوهري بين نظرية المراجحة APT ونموذج CAPM:",options:["لا فرق بينهما","CAPM يعتمد متغيراً وحيداً (بيتا محفظة السوق)، بينما APT يعتمد على مجموعة عوامل متعددة","APT يهمل المخاطرة","CAPM يستخدم عدة عوامل وAPT عاملاً واحداً"],correct:1,source:"تختلف APT عن CAPM في أن CAPM يعتبر المتغير الوحيد الهام هو حساسية عائد الورقة للتغيرات في محفظة السوق (بيتا)، بينما APT تعتمد على مجموعة من العوامل المتعددة."},{q:"المشكلة الأساسية في نظرية المراجحة (APT) تتمثل في:",options:["صعوبة حساب العائد","عدم تحديد العوامل الاقتصادية التي تؤثر على الأوراق المالية","إهمال سعر الفائدة","الاعتماد على بيتا فقط"],correct:1,source:"المشكلة الأساسية في نظرية المراجحة أنها تتحدث عن عوامل اقتصادية عامة وعوامل خاصة بالمنشأة دون تحديد هذه العوامل بدقة، على عكس CAPM الذي يحدد محفظة السوق كعامل رئيسي."}],formulas:[{id:"cml",name:"خط سوق رأس المال (CML)",single:"E(R)ₚ = R_f + λ·σ(R)ₚ",parts:[["E(R)ₚ = R_f + λ·σₚ"]],vars:["R_f = الخالي من المخاطرة","λ = سعر الخطر","σₚ = مخاطرة المحفظة (الكلية)"],tip:"R_f + (سعر الخطر × المخاطرة الكلية). للمحافظ الكفوءة فقط.",legend:"λ: سعر الخطر التوازني · σ(R)ₚ: المخاطرة الكلية للمحفظة · للمحافظ الكفوءة فقط",fast:"«الخالي من المخاطرة» = R_f · «سعر الخطر» = λ · «مخاطرة المحفظة» = σ. العائد = R_f + λ×σ. للمحافظ الكفوءة فقط (يستخدم المخاطرة الكلية σ).",example:"R_f=6%، λ=0.40، σ=30% → E(R) = 6% + 0.40×30% = 18%"},{id:"lambda",name:"سعر الخطر التوازني λ",single:"λ = (Rₘ − R_f) ÷ σₘ",parts:[["λ = ",{n:"Rₘ − R_f",d:"σₘ"}]],vars:["Rₘ = عائد السوق","R_f = الخالي من المخاطرة","σₘ = مخاطرة السوق"],tip:"علاوة الخطر ÷ مخاطرة السوق = ميل خط CML.",exParts:[["λ = ",{n:"18 − 6",d:"30"}," = 0.40"]],legend:"علاوة خطر السوق ÷ مخاطرة السوق · هو ميل خط CML",fast:"«عائد السوق» = Rₘ · «الخالي من المخاطرة» = R_f · «مخاطرة السوق» = σₘ. λ = (Rₘ−R_f) ÷ σₘ (علاوة الخطر لكل وحدة مخاطرة = ميل خط CML).",example:"(18%−6%)/30% = 0.40"},{id:"beta",name:"معامل بيتا β",single:"βᵢ = cov(i,m) ÷ σ²ₘ = (ρᵢₘ·σᵢ·σₘ) ÷ σ²ₘ",parts:[["βᵢ = ",{n:"cov(i,m)",d:"σ²ₘ"}," = ",{n:"ρ·σᵢ",d:"σₘ"}]],vars:["ρ = الارتباط مع السوق","σᵢ = انحراف السهم · σₘ = انحراف السوق","cov = التغاير مع السوق"],tip:"β = ρ×σᵢ÷σₘ، أو cov÷σ²ₘ. بيتا السوق=1، والخالي من المخاطرة=0.",legend:"يقيس المخاطر المنتظمة (السوقية) · β>1 أخطر من السوق · β=1 مساوٍ · β<1 أقل",fast:"«الارتباط مع السوق» = ρ · «انحراف السهم» = σᵢ · «انحراف السوق» = σₘ. β = ρ×σᵢ ÷ σₘ. لو معطى «التغاير cov» بدل الارتباط: β = cov ÷ σ²ₘ. بيتا السوق = 1، والخالي من المخاطرة = 0.",example:"cov(i,m)=0.020، σ²ₘ=0.01 → β = 2"},{id:"sml",name:"خط سوق الورقة المالية (SML) — CAPM",single:"E(R)ᵢ = R_f + βᵢ·(Rₘ − R_f)",parts:[["E(R)ᵢ = R_f + βᵢ·(Rₘ − R_f)"]],vars:["R_f = الخالي من المخاطرة","Rₘ = عائد السوق","βᵢ = بيتا"],tip:"المطلوب = R_f + β×(علاوة السوق). المتوقع>المطلوب→شراء (فوق SML)، أقل→بيع.",legend:"العائد = خالٍ من المخاطرة + بيتا×علاوة خطر السوق · يعمل لكل الأوراق",fast:"«الخالي من المخاطرة» = R_f · «عائد السوق» = Rₘ · «بيتا» = β. المطلوب = R_f + β×(Rₘ−R_f). العلاقة طردية مع β. المتوقع > المطلوب → فوق الخط (شراء)، أقل → تحته (بيع).",example:"R_f=5%، β=0.9، Rₘ=12% → 5% + 0.9(12%−5%) = 11.3%"},{id:"estr",name:"العائد المقدّر وسعر التوازن",single:"Rᵢ = [D + (P − P₀)] ÷ P₀   |   السعر العادل: نحل P₀ من العائد المطلوب",parts:[["Rᵢ = ",{n:"D + (P − P₀)",d:"P₀"}]],vars:["D = التوزيعات","P = السعر المتوقع · P₀ = السعر الحالي"],tip:"قارن المقدّر بالمطلوب: أكبر→شراء، أقل→بيع، يساوي→توازن. السعر العادل: حلّ للـ P₀.",legend:"D: التوزيعات · P: السعر المتوقع · P₀: السعر الحالي",fast:"«التوزيعات» = D · «السعر المتوقع» = P · «الحالي» = P₀. العائد المقدّر = (D+P−P₀)/P₀. قارنه بالمطلوب (SML): أكبر→شراء، أقل→بيع، يساوي→توازن. السعر العادل: حلّ المعادلة للـ P₀.",example:"المطلوب 16%: 0.16=(5.2+42−P₀)/P₀ → P₀ = 40.68 (السعر العادل)"},{id:"wbeta",name:"بيتا المرجّح للمحفظة *β",single:"*β = Σ(βᵢ·Vᵢ) ÷ ΣVᵢ",parts:[["*β = ",{n:"Σ(βᵢ·Vᵢ)",d:"ΣVᵢ"}]],vars:["βᵢ = بيتا كل أصل","Vᵢ = قيمته السوقية"],tip:"متوسط مرجّح بالقيم. الأصل الخالي من المخاطرة β=0.",legend:"متوسط مرجّح لبيتاوات الأصول بأوزان قيمها السوقية V",fast:"«بيتا كل أصل» = βᵢ · «قيمته السوقية» = Vᵢ. بيتا المحفظة = Σ(βᵢ×Vᵢ) ÷ ΣVᵢ (متوسط مرجّح بالقيم). الأصل الخالي من المخاطرة β=0.",example:"V=1000/1000/1000/500، β=0.75/1.25/1.40/0.2 → *β = 3500/3500 = 1"},{id:"capmdec",name:"قاعدة القرار الاستثماري (CAPM)",single:"اقبل إذا: E(R*) > R_f + *β·(E(Rₘ) − R_f)",parts:[["اقبل إذا:  E(R*) > R_f + *β·(E(Rₘ) − R_f)"]],vars:["E(R*) = العائد المقدّر للمشروع","R_f = الخالي من المخاطرة · *β = بيتا المحفظة"],tip:"احسب المطلوب لكل أصل، قارنه بالمقدّر: مقدّر>مطلوب→قبول (فوق SML)، أقل→رفض.",legend:"قبول المشروع إذا وقع فوق SML (المقدّر > المطلوب)",fast:"احسب المطلوب لكل أصل = R_f + β×(Rₘ−R_f). قارنه بالعائد المقدّر: مقدّر > مطلوب → قبول (فوق SML)، أقل → رفض.",example:"السهم A: مطلوب 15%، مقدّر 20% → فائض +5% → قبول ✅"},{id:"apt",name:"نموذج العوامل (APT)",single:"Rᵢ = E(Rᵢ) + bᵢ₁δ₁ + bᵢ₂δ₂ + … + bᵢₖδₖ + dᵢ",parts:[["Rᵢ = E(Rᵢ) + bᵢ₁δ₁ + bᵢ₂δ₂ + … + bᵢₖδₖ + dᵢ"]],vars:["δₖ = العوامل الاقتصادية العامة","bᵢₖ = حساسية العائد لكل عامل","dᵢ = المخاطر غير المنتظمة"],tip:"APT يعتمد عدة عوامل بدل عامل واحد. مشكلته: عدم تحديد العوامل بدقة.",legend:"δₖ: العوامل الاقتصادية العامة · bᵢₖ: حساسية العائد لكل عامل · dᵢ: المخاطر غير المنتظمة (خاصة بالمنشأة)",fast:"APT يعتمد عدة عوامل (تضخم، فائدة، ناتج محلي…) بدل عامل واحد كما في CAPM. مشكلته: عدم تحديد العوامل بدقة.",example:"واضعها ستيفن روس 1976 · 3 فرضيات رئيسية · نوعا العوامل: عامة + خاصة بالمنشأة"}]},{id:"ch8",num:"الثامن",title:"قياس وتقييم أداء مدراء المحافظ الاستثمارية",kind:"نظري + ع حد: 1 + (معدل × أيام) ÷ 36000."},{name:"شهادة الإيداع — صافي الحصيلة",tag:"CD · ثابت 36500",f:"s = الاسمي × [36500 + (Rc×p)] ÷ [36500 + (Rn×pₑ)]",s:"نفس فكرة الورقة التجارية بس بثابت 36500 (لأنها 365 يوم). البسط بمعدل الشهادة وأيامها الكاملة، المقام بمعدل السوق والأيام المتبقية عند البيع.",h:"الاسمي × (36500+معدل الشهادة×أيامها) ÷ (36500+معدل السوق×المتبقي)."},{name:"القبول المصرفي — الفائدة المكافئة",tag:"BA · ثابت 360",f:"الفائدة السنوية = A_b ÷ [ 100 − (A_b × الأيام) ÷ 360 ]",s:"خصم بيتحوّل لفائدة سنوية مكافئة. الحيلة: القسمة على صافي المبلغ (بعد طرح الخصم) هي اللي بترفع العائد عن رقم الخصم الظاهري.",h:"الخصم ÷ صافي المبلغ [100 − (الخصم × الأيام) ÷ 360]."}]},{idx:"الفصل ٣",title:"مخاطر الأوراق المالية وعوائدها",sub:"قلب الأساسيات. هون بتتعلّم تقيس العائد (قدّيش ربحت) والمخاطرة (قدّيش الربح مو مضمون)، لسهم مفرد ولمحفظة.",laws:[{name:"العائد السنوي على سهم",tag:"annualized return",f:"العائد السنوي = [D + (P₁ − P₀)] ÷ P₀ × (360 ÷ n)",s:"احسب عائد الفترة أول: (التوزيعات + الربح) ÷ سعر الشراء. بعدها سنوّيه بضربه × (360 ÷ الأيام). كلمة «بعد كذا يوماً» بالسؤال = لازم تسنوّي.",h:"عائد الفترة × (360 ÷ عدد الأيام)."},{name:"العائد المتوقع — متوسط تاريخي",tag:"E(R) · average",f:"E(R) = (1/n) · Σ Rₜ",s:"عندك عوائد سنين ماضية وبدك رقم واحد يمثّلها. متل علامة الفصل بالمدرسة: بتجمع كل العلامات وبتقسم على عددها. ما في شي مخيف — متوسط حسابي عادي.",h:"اجمع كل العوائد واقسمها على عددها."},{name:"العائد المتوقع — مع الاحتمالات",tag:"E(R) = Σ Pᵢ·Rᵢ",f:"E(R) = Σ Pᵢ · Rᵢ",s:"هون الحالات مو متساوية: رواج احتماله 30%، كساد 20%... فما بتقدر تجمع بالتساوي. بتعطي كل عائد «وزنه» حسب احتمال حدوثه — اضربه باحتماله. الحالة الأرجح بتأثّر أكتر. كلمة «باحتمال» بالسؤال = هاد القانون.",h:"اضرب كل عائد باحتمال حدوثه، واجمع الكل."},{name:"الانحراف المعياري — المخاطرة",tag:"σ (sigma)",f:"σ = √[ Σ(Rᵢ − E(R))² ÷ (n−1) ]",alt:"وللتوزيع الاحتمالي: σ = √[ Σ Pᵢ·(Rᵢ − E(R))² ]",s:"المتوسط لحالو بيكذب: سهمين ممكن نفس المتوسط، بس واحد ثابت وواحد بيرقص. الانحراف بيقيس قدّيش بترقص العوائد حوالين متوسطها. شوف بُعد كل عائد عن المتوسط، ربّعه (تشيل الإشارة السالبة)، خُد المتوسط، وجذّر لترجع للوحدة الأصلية. انتبه: بالعيّنة نقسم على (n−1) مو n.",h:"قدّيش تبعد العوائد عن متوسطها: ربّع الفروقات، خُد متوسطها، ثم جذّر."},{name:"معامل الاختلاف — المخاطرة النسبية",tag:"CV = σ ÷ E(R)",f:"CV = σ ÷ E(R)",s:"سؤال ذكي: سهم مخاطرته 10 وآخر مخاطرته 12 — أيّهما أخطر؟ ما بتقدر تحكم إلا إذا عرفت عائد كل واحد. المعامل بيقيس قدّيش مخاطرة مقابل كل وحدة عائد. الأصغر أفضل: مخاطرة أقل لكل ليرة عائد.",h:"المخاطرة ÷ العائد — والأصغر هو الأفضل."},{name:"قيمة Z — للاحتمالات",tag:"Z-score",f:"Z = [R − E(R)] ÷ σ",s:"بدك احتمال إنو العائد يكون أقل/أكثر من رقم معيّن. Z بتحوّل سؤالك لـ«كم انحراف معياري يبعد هالرقم عن المتوسط»، وبعدها جدول Z بيعطيك المساحة (الاحتمال). للطرف الواحد: اطرح من 1.",h:"(الرقم − المتوسط) ÷ الانحراف = كم انحراف يبعد عن المركز، ثم روح للجدول."},{name:"رافعة التشغيل",tag:"DOL",f:"DOL = %ΔEBIT ÷ %ΔQ = Q(P−V) ÷ [Q(P−V) − F]",s:"قدّيش أرباح التشغيل حسّاسة لتغيّر المبيعات: لو المبيعات زادت 10% كم بتزيد الأرباح؟ التكاليف الثابتة هي اللي بتكبّر الرافعة — لأنها ما بتتغيّر مع المبيعات فبتضخّم الأثر.",h:"نسبة تغيّر الأرباح ÷ نسبة تغيّر المبيعات."},{name:"رافعة التمويل",tag:"DFL",f:"DFL = EBIT ÷ (EBIT − I)",s:"نفس فكرة التشغيل بس للفوائد: قدّيش ربح السهم حسّاس لتغيّر أرباح التشغيل. الفائدة على الديون (I) هي اللي بتكبّر الرافعة.",h:"EBIT ÷ (EBIT − الفائدة)."},{name:"الرافعة المشتركة",tag:"CL = DOL × DFL",f:"CL = DOL × DFL",s:"التشغيل بيكبّر أثر المبيعات على أرباح التشغيل، والتمويل بيكبّر أثر أرباح التشغيل على ربح السهم. لما تضربهن ببعض بتطلع الرافعة الكلية: قدّيش المبيعات بتأثّر على ربح السهم النهائي مروراً بالمرحلتين. ببساطة حاصل ضرب الرافعتين.",h:"رافعة التشغيل × رافعة التمويل."},{name:"عائد المحفظة",tag:"E(Rₚ) = Σ Wᵢ·Rᵢ",f:"E(Rₚ) = Σ Wᵢ · Rᵢ",s:"محفظتك فيها عدة أوراق، كل وحدة بوزن (نسبة من مالك). عائد المحفظة = المتوسط الموزون: كل ورقة بتساهم بعائدها حسب حجمها فيك. الورقة اللي حاطط فيها أكتر بتأثّر أكتر.",h:"اضرب وزن كل ورقة بعائدها، واجمع."},{name:"مخاطرة المحفظة — حسب الارتباط ρ",tag:"σₚ · correlation",f:"ρ=+1 → σₚ = w₁σ₁ + w₂σ₂",alt:"ρ=−1 → σₚ = |w₁σ₁ − w₂σ₂|   ·   ρ=0 → σₚ = √(w₁²σ₁² + w₂²σ₂²)",s:"هون سحر التنويع. الارتباط ρ بيقول هل الورقتين بيتحركوا سوا: عند +1 يتحركوا سوا تماماً، ما في فايدة تنويع → اجمع. عند −1 يتحركوا عكس بعض فيلغوا بعض → اطرح (وممكن توصل صفر!). عند 0 ما في علاقة → جذر مجموع المربعات.",h:"حسب الارتباط: +1 اجمع · −1 اطرح · 0 جذر مجموع المربعات."}]},{idx:"الفصل ٤",title:"النظرية الحديثة لإدارة المحفظة",sub:"هون بتعمّق بمخاطرة المحفظة: القانون العام اللي بتطلع منه كل الحالات، وكيف تختار الأوزان المثلى.",laws:[{name:"القانون الأمّ لمخاطرة المحفظة",tag:"σ²ₚ — full variance",f:"σ²ₚ = w₁²σ₁² + 2·w₁·w₂·ρ·σ₁·σ₂ + w₂²σ₂²",s:"هاد الأصل اللي بتطلع منه الحالات الثلاث فوق. ثلاث حدود: مخاطرة الأولى، مخاطرة الثانية، والحد الأوسط اللي بيمثّل العلاقة بينهن (فيه ρ). لما ρ=0 الحد الأوسط بيصير صفر · لما ρ=+1 أو −1 بينضغط للصيغ المختصرة. احفظ هالواحد وكل الباقي بيطلع منه — الحالات الخاصة (+1، −1، صفر) اللي بالفصل السابق كلها تفريعات منه.",h:"مربّع كل ورقة + ضِعف الحد المشترك (اللي فيه الارتباط)، ثم جذّر."},{name:"الوزن الأمثل — أقل مخاطرة",tag:"w · optimal weight",f:"w₁ = σ₂(σ₂ − σ₁·ρ) ÷ (σ₁² + σ₂² − 2σ₁σ₂ρ)",alt:"مختصر عند ρ=−1:  w₁ = σ₂ ÷ (σ₁ + σ₂)",s:"بدك تعرف كم تحط بكل ورقة لتصير مخاطرة المحفظة أقل ما يمكن. القاعدة الذهبية اللي بتنقذك بالامتحان: الوزن الأكبر دايماً بيروح للورقة الأقل مخاطرة (مهما كان ترتيب الرموز). وعند ارتباط −1 في مختصر حلو: وزن الورقة = انحراف الورقة التانية ÷ مجموع الانحرافين.",h:"الوزن الأكبر للورقة الأقل مخاطرة · عند −1: انحراف الأخرى ÷ مجموع الانحرافين."}]},{idx:"الفصل ٧",title:"نموذج CAPM ونظرية المراجحة APT",sub:"الفكرة الجامعة لكل الفصل: العائد المطلوب = الأمان + مكافأة على المخاطرة. وكل قانون تفريعة من هالجملة.",laws:[{name:"معامل بيتا — شجاعة السهم",tag:"β = cov ÷ σ²ₘ",f:"βᵢ = cov(i,m) ÷ σ²ₘ",s:"بيتا مقياس شجاعة سهمك مقابل السوق: لما السوق يتحرك حركة، قدّيش سهمك بيتحرك؟ اقسم «تحرّك سهمك مع السوق» (التغاير) على «تحرّك السوق مع حالو» (تباين السوق). β=1 يتحرك مثل السوق · β>1 أشجع (هجومي) · β<1 أهدى (دفاعي).",h:"كم يتحرك سهمك لكل حركة بالسوق: التغاير ÷ تباين السوق."},{name:"بيتا المحفظة",tag:"*β = Σ(βᵢ·Vᵢ) ÷ ΣVᵢ",f:"*β = Σ(βᵢ · Vᵢ) ÷ Σ Vᵢ",s:"بيتا المحفظة كلها = المتوسط الموزون لبيتاوات أوراقها، كل ورقة بتساهم ببيتاها حسب حجمها. ملاحظة بتنفعك: أذون الخزينة بيتاها صفر، فوجودها بيسحب بيتا المحفظة لتحت.",h:"المتوسط الموزون لبيتاوات الأوراق (بأوزان قيمها السوقية)."},{name:"العائد المطلوب — CAPM / خط SML ⭐",tag:"E(R) = R_f + β(Rₘ − R_f)",f:"E(R)ᵢ = R_f + βᵢ · (Rₘ − R_f)",s:"القانون الأشهر بالمادة، وأبسط مما بيبيّن. تخيّل بدك تحط مصاري. الأمان R_f = أذون الخزينة (عائد صغير مضمون). عشان تتغرى تخاطر بالسوق، لازم ياخد مكافأة = الفرق بين عائد السوق والأمان (Rₘ−R_f). وبيتا شجاعة سهمك بتضاعف هالمكافأة. النتيجة: عائدك = الأمان + (شجاعتك × مكافأة السوق).",h:"الخالي من المخاطرة + بيتا × (عائد السوق − الخالي من المخاطرة)."},{name:"العائد المتوقَّع/المقدَّر من السهم",tag:"R = [D+(P−P₀)]÷P₀",f:"Rᵢ = [D + (P − P₀)] ÷ P₀",s:"انتبه للفرق: هاد العائد اللي بتتوقعه فعلاً من السهم، مو المطلوب نظرياً. بتاخد التوزيعات + الربح الرأسمالي (فرق السعر) وبتقسم على سعر الشراء. الخطوة الجاية: تقارنه بالمطلوب من CAPM لتقرّر.",h:"(التوزيعات + فرق السعر) ÷ سعر الشراء."},{name:"قرار الشراء أو البيع",tag:"المقدّر vs المطلوب",f:"اقبل / اشترِ  إذا  المقدّر > المطلوب (CAPM)",s:"هون بتجمع القطعتين. احسب المطلوب من CAPM، وحطّ جنبه المتوقّع/المقدّر. إذا المتوقّع أعلى من المطلوب = السهم رخيص (فوق خط SML) = اشترِ. أقل = غالي = بِع. مساوي = عادل. تخيّل خط SML «السعر العادل»، وأي سهم فوقه لقية.",h:"فوق الخط رخيص اشترِ · على الخط عادل · تحت الخط غالي بِع."},{name:"خط سوق رأس المال CML",tag:"CML",f:"E(R)ₚ = R_f + λ · σₚ",s:"شبيه CAPM بس للمحافظ الكفوءة، وبيستخدم المخاطرة الكلية σ بدل بيتا. بيرسم العلاقة بين عائد أي محفظة كفوءة ومخاطرتها الكلية: كل ما زادت المخاطرة، زاد العائد بمعدل ثابت هو λ. النقطة على الخط اللي عندها σ=0 هي الأمان R_f.",h:"الأمان + سعر الخطر λ × مخاطرة المحفظة الكلية."},{name:"سعر الخطر التوازني λ",tag:"price of risk (slope)",f:"λ = (Rₘ − R_f) ÷ σₘ",s:"λ هي «سعر الخطر» — قدّيش عائد إضافي بتاخد لكل وحدة مخاطرة، وهي ميل خط CML. بتحسبها مرة وحدة: علاوة السوق (عائد السوق ناقص الأمان) مقسومة على مخاطرة السوق، وبتستخدمها بمعادلة CML.",h:"علاوة السوق ÷ مخاطرة السوق = ميل الخط."},{name:"نظرية المراجحة APT",tag:"APT · multi-factor",f:"E(Rₚ) = R_f + λ₁β₁ + λ₂β₂ + … + λₙβₙ",s:"CAPM بيفترض مصدر خطر واحد: السوق. APT بيقول لأ — في عدة مصادر خطر (تضخم، أسعار فائدة، نمو اقتصادي...)، كل عامل إلو سعر خطر خاص λ وحساسية خاصة β. فالعائد = الأمان + مجموع (سعر كل عامل × حساسيتك له). يعني CAPM هو حالة خاصة من APT بعامل واحد.",h:"الأمان + مجموع (سعر خطر كل عامل × حساسية المحفظة له) — CAPM بعدة عوامل."}]},{idx:"الفصل ٨",title:"قياس وتقييم أداء مدراء المحافظ",sub:"أسهل فصل — أغلب المقاييس نفس الفكرة: العائد الإضافي فوق الأمان ÷ نوع من المخاطرة. لو مسكت وحدة مسكت الباقي.",note:"شارب / ترينور / جنسن نفس البسط (العائد − الأمان). الفرق بالمقام: شارب ÷ σ · ترينور ÷ بيتا · جنسن يطرح المتوقَّع.",laws:[{name:"عائد المحفظة البسيط (خلال فترة)",tag:"rₚ · single period",f:"rₚ = [ f + (V_f − Vᵢ) ] ÷ Vᵢ",s:"عائد محفظة خلال فترة: كل الفلوس اللي دخلت (توزيعات + أرباح محققة = f) زائد كم كبرت المحفظة (فرق القيمة)، مقسوم على قيمة البداية.",h:"(الدخل النقدي + نمو القيمة) ÷ قيمة البداية."},{name:"مؤشر شارب",tag:"Sharpe",f:"Sharpe = (E(R)ₚ − R_f) ÷ σₚ",s:"قدّيش عائد إضافي فوق الأمان أخذت المحفظة، مقابل كل وحدة مخاطرة كلية (انحراف معياري). الأعلى = مدير أشطر لكل وحدة مخاطرة تحمّلها.",h:"(عائد المحفظة − الأمان) ÷ الانحراف المعياري."},{name:"مؤشر ترينور",tag:"Treynor",f:"Treynor = (E(R)ₚ − R_f) ÷ βₚ",s:"نفس شارب بالضبط، بس يقسم على بيتا بدل الانحراف — يعني بيقيس العائد الإضافي مقابل المخاطرة السوقية فقط (مو الكلية). الأعلى أفضل.",h:"(عائد المحفظة − الأمان) ÷ بيتا المحفظة."},{name:"ألفا جنسن",tag:"Jensen's α",f:"α = (E(R)ₚ − R_f) − βₚ(E(R)ₘ − R_f)",alt:"مختصراً: α = العائد المحقق − العائد المطلوب (CAPM)",s:"ألفا بتقيس قدّيش المدير تفوّق على المتوقَّع منه. احسب العائد اللي المفروض يحققه حسب مخاطرته (من CAPM)، واطرحه من اللي حققه فعلاً. موجب = تفوّق · صفر = عادي · سالب = تقصير.",h:"العائد المحقق − العائد المطلوب حسب CAPM · موجب يعني المدير شاطر."},{name:"الانتقائية الصافية — فاما",tag:"Fama · net selectivity",f:"NS = E(R)ₚ − E(R)ₓ",s:"فاما فكّك أداء المدير: الانتقائية الصافية = العائد اللي حققه فعلاً ناقص عائد محفظة متنوّعة بنفس المخاطرة الكلية (E(R)ₓ). الموجب يعني المدير اختار أسهم أفضل من مجرّد التعرّض للمخاطرة. والباقي (عائد التنويع) بيقيس الفايدة اللي أضافها التنويع.",h:"عائد المحفظة الفعلي − عائد محفظة متنوّعة بنفس المخاطرة."},{name:"نموذج فاما وفرنش (العوامل الثلاثة)",tag:"Fama-French · 3-factor",f:"E(R)ᵢ − R_f = α + β(Rₘ − R_f) + ς·SMB + η·HML",s:"لاحظوا إنو CAPM ما بيفسّر كل شي: الشركات الصغيرة والرخيصة (قيمة دفترية عالية) بتعطي عوائد أعلى مما توقّع CAPM. فأضافوا عاملين فوق عامل السوق: SMB (الحجم = عائد الصغيرة ناقص الكبيرة) و HML (القيمة = عائد الرخيصة ناقص الغالية). ألفا الموجبة هون = أداء متفوّق بعد حسم العوامل الثلاثة.",h:"CAPM + عامل الحجم (SMB) + عامل القيمة (HML)."},{name:"توقيت السوق — ترينور ومازوي",tag:"Treynor-Mazuy · timing",f:"Rₚ − R_f = α + β(Rₘ − R_f) + δ(Rₘ − R_f)² + ε",s:"كيف تعرف إذا المدير بيعرف «يوقّت» السوق — يزيد المخاطرة قبل الصعود ويقلّلها قبل الهبوط؟ بتضيف حد تربيعي (Rₘ−R_f)². إذا معامله δ طلع موجب وذو دلالة = العلاقة صارت منحنية لفوق = المدير عنده مهارة توقيت فعلية.",h:"أضف حداً تربيعياً — δ موجبة تعني المدير يعرف يوقّت السوق."},{name:"قياس الأداء بنموذج المراجحة APT",tag:"APT-based performance",f:"α = R_actual − [ R_f + Σ λⱼ·βⱼ ]",s:"نفس فكرة ألفا جنسن بس بدل CAPM (عامل واحد) بنستخدم APT (عدة عوامل خطر). احسب العائد اللي المفروض يحققه المدير حسب تعرّضه لكل عامل، واطرحه من اللي حققه فعلاً. الموجب = تفوّق حقيقي بعد حسم كل العوامل مو عامل السوق بس.",h:"العائد المحقق − العائد المطلوب حسب APT (بعدة عوامل)."}]},{idx:"الفصل ٩",title:"الفقرات الخارجية المضافة",sub:"إضافات على المقرر تتمّم فكرة المحفظة المثلى: أقل مخاطرة ممكنة، الأوزان من عائد مطلوب، والتغاير اللي هو أساس كل شي.",laws:[{name:"المحفظة ذات التباين الأدنى MVP",tag:"min-variance portfolio",f:"w₁ = σ₂(σ₂ − σ₁·ρ) ÷ (σ₁² + σ₂² − 2σ₁σ₂ρ)",s:"هي المحفظة اللي عندها أقل مخاطرة ممكنة من أي مزيج للورقتين — أقصى نقطة يسار على منحنى المحافظ الممكنة. بتطلعها بنفس معادلة الوزن الأمثل تماماً. الفرق فكرة مو حساب: هون هدفك مو أعلى عائد، بل أقل تذبذب ممكن.",h:"نفس معادلة الوزن الأمثل — النتيجة أقل مخاطرة ممكنة (أقصى يسار المنحنى)."},{name:"الأوزان من عائد مستهدف",tag:"solve for w",f:"Rₚ = w·R₁ + (1−w)·R₂   →   حُلّ لـ w",s:"العملية العكسية: بيعطوك عائد محفظة مطلوب وبدهم الأوزان. حط عائد المحفظة = المتوسط الموزون، وبيصير عندك معادلة بمجهول واحد (w)، حُلّها. الوزن الأكبر بيروح للورقة الأقرب عائداً للهدف. لازم يكون الهدف بين عائدي الورقتين.",h:"حط العائد المستهدف = w·R₁ + (1−w)·R₂، وحُلّ المعادلة لإيجاد w."},{name:"التغاير — الانحراف المشترك بين ورقتين",tag:"cov(1,2)",f:"cov(1,2) = Σ Pᵢ·(R₁ᵢ − E₁)·(R₂ᵢ − E₂)",s:"بدك تعرف هل الورقتين بيتحركوا سوا ولا عكس بعض. لكل حالة اقتصادية: اضرب (بُعد الأولى عن متوسطها × بُعد الثانية عن متوسطها × الاحتمال) واجمع. الموجب = بيتحركوا بنفس الاتجاه · السالب = عكس بعض (وهاد أحسن للتنويع!). هاد التغاير هو أساس بيتا ومعامل الارتباط.",h:"لكل حالة: (انحراف الأولى × انحراف الثانية × الاحتمال)، واجمع. سالب = تنويع أفضل."}]}],D0=`محفظة من سهمين:
